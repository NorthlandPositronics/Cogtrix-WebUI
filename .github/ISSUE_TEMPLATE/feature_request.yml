name: Feature Request
description: Suggest a new UI feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement.
        Check [existing issues](../issues?q=is%3Aissue+label%3Aenhancement) first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. What are you trying to do that you can't do today?
      placeholder: "When reviewing a long session, there's no way to jump to a specific message by date..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, or workarounds you're currently using.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Chat / session view
        - Session list
        - Settings / setup wizard
        - Assistant
        - Admin
        - Documents
        - Authentication
        - Sidebar / navigation
        - Accessibility
        - Performance
        - Mobile / responsive layout
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this has not been requested before
          required: true
        - label: This request is specific enough to be actionable
          required: true
