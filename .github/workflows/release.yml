name: Release – Docker Build & Publish

on:
  # Fires automatically when release-please publishes a GitHub Release (creates the tag).
  # This is the primary trigger — no manual dispatch needed in normal flow.
  release:
    types: [published]
  # Manual fallback: re-run for a specific tag (e.g. after a failed automatic run).
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.1.1)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # On release event use the published tag; on manual dispatch use the input.
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Quality gate — same checks as CI, must pass before release
  # ─────────────────────────────────────────────────────────────
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        id: install
        run: pnpm install --frozen-lockfile

      - name: Prettier (formatting)
        id: prettier
        if: always() && steps.install.outcome == 'success'
        run: pnpm format:check

      - name: ESLint (linting)
        id: eslint
        if: always() && steps.install.outcome == 'success'
        run: pnpm lint

      - name: Build (type-check + bundle)
        id: build
        if: always() && steps.install.outcome == 'success'
        run: pnpm build

      - name: Gate
        if: always()
        run: |
          results=(
            "${{ steps.prettier.outcome }}"
            "${{ steps.eslint.outcome }}"
            "${{ steps.build.outcome }}"
          )
          for r in "${results[@]}"; do
            if [ "$r" = "failure" ]; then
              echo "::error::Quality gate failed — aborting release"
              exit 1
            fi
          done

  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:unit

  build-image:
    name: Build image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [quality, test]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (per-arch)
        run: |
          TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-${{ matrix.arch }}"
          docker build -f docker/Dockerfile -t "${TAG}" .
          docker push "${TAG}"

  publish-manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG="${{ env.RELEASE_TAG }}"

          docker manifest create "${BASE}:${TAG}" \
            "${BASE}:${TAG}-amd64" \
            "${BASE}:${TAG}-arm64"
          docker manifest push "${BASE}:${TAG}"

          # Also tag as "latest"
          docker manifest create "${BASE}:latest" \
            "${BASE}:${TAG}-amd64" \
            "${BASE}:${TAG}-arm64"
          docker manifest push "${BASE}:latest"
