services:
  cogtrix:
    image: cogtrix:latest
    # build: ../Cogtrix  # uncomment to build from local source
    env_file: .env.cogtrix
    volumes:
      - cogtrix-data:/app/data
    restart: unless-stopped

  webui:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:80"
    environment:
      BACKEND_HOST: cogtrix
      BACKEND_PORT: 8000
    depends_on:
      - cogtrix
    restart: unless-stopped

volumes:
  cogtrix-data:
