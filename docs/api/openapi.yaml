          description: Initial session configuration; all fields are optional.
      type: object
      title: SessionCreateRequest
      description: Request body for POST /api/v1/sessions.
    SessionOut:
      properties:
        id:
          type: string
          title: Id
          description: UUID v4 uniquely identifying this session.
          examples:
          - 3f2504e0-4f89-11d3-9a0c-0305e82c3301
        name:
          type: string
          title: Name
          description: Human-readable session name (editable).
          examples:
          - Research — climate policy
        owner_id:
          type: string
          title: Owner Id
          description: UUID v4 of the user who owns this session.
        state:
          type: string
          enum:
          - idle
          - thinking
          - analyzing
          - researching
          - deep_thinking
          - writing
          - delegating
          - done
          - error
          title: State
          description: Current agent state for this session.
          examples:
          - idle
        config:
          $ref: '#/components/schemas/SessionConfig'
          description: Active configuration for this session.
        token_counts:
          $ref: '#/components/schemas/TokenCounts'
          description: Cumulative token usage in this session.
        active_tools:
          items:
            type: string
          type: array
          title: Active Tools
          description: Names of tools currently loaded in the active set.
          examples:
          - - read_file
            - web_search
        created_at:
          type: string
          format: date-time
          title: Created At
          description: UTC timestamp when the session was created.
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: UTC timestamp of the last activity in this session.
        archived_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Archived At
          description: UTC timestamp when the session was archived (null if active).
      type: object
      required:
      - id
      - name
      - owner_id
      - state
      - config
      - token_counts
      - created_at
      - updated_at
      title: SessionOut
      description: Full session representation returned from GET/POST/PATCH endpoints.
    SessionPatchRequest:
      properties:
        name:
          anyOf:
          - type: string
            maxLength: 256
          - type: 'null'
          title: Name
          description: New session name.
          examples:
          - Renamed session
        config:
          anyOf:
          - $ref: '#/components/schemas/SessionConfig'
          - type: 'null'
          description: Partial config update; only supplied sub-fields are changed.
      type: object
      title: SessionPatchRequest
      description: 'Request body for PATCH /api/v1/sessions/{id}.


        All fields are optional; only supplied fields are updated.'
    SystemInfoOut:
      properties:
        version:
          type: string
          title: Version
          description: Cogtrix version string.
          examples:
          - 0.1.14
        api_version:
          type: string
          title: Api Version
          description: API version prefix.
          examples:
          - v1
        platform:
          type: string
          title: Platform
          description: Host OS platform string.
          examples:
          - Linux 6.14.0
        python_version:
          type: string
          title: Python Version
          description: Python interpreter version.
          examples:
          - 3.12.2
        debug:
          type: boolean
          title: Debug
          description: True when debug logging is active.
        verbose:
          type: boolean
          title: Verbose
          description: True when verbose logging is active.
        uptime_s:
          type: number
          title: Uptime S
          description: API server uptime in seconds.
          examples:
          - 3600.0
        started_at:
          type: string
          format: date-time
          title: Started At
          description: UTC timestamp when the API server started.
      type: object
      required:
      - version
      - api_version
      - platform
      - python_version
      - debug
      - verbose
      - uptime_s
      - started_at
      title: SystemInfoOut
      description: System information returned from GET /api/v1/system/info.
    TokenCounts:
      properties:
        input_tokens:
          type: integer
          title: Input Tokens
          description: Cumulative input tokens sent to the LLM in this session.
          examples:
          - 12400
        output_tokens:
          type: integer
          title: Output Tokens
          description: Cumulative output tokens received from the LLM in this session.
          examples:
          - 3200
        context_window:
          type: integer
          title: Context Window
          description: Maximum context window for the current model (tokens).
          examples:
          - 131072
      type: object
      required:
      - input_tokens
      - output_tokens
      - context_window
      title: TokenCounts
      description: Token usage snapshot for a session.
    TokenPair:
      properties:
        access_token:
          type: string
          title: Access Token
          description: Short-lived JWT for API authentication (attach as Bearer token).
        refresh_token:
          type: string
          title: Refresh Token
          description: Long-lived opaque token for silent access token renewal.
        token_type:
          type: string
          const: bearer
          title: Token Type
          description: Always 'bearer'.
          default: bearer
        expires_in:
          type: integer
          title: Expires In
          description: Seconds until the access token expires.
          examples:
          - 3600
      type: object
      required:
      - access_token
      - refresh_token
      - expires_in
      title: TokenPair
      description: 'Access + refresh token pair returned on login or refresh.


        ``access_token`` is a short-lived JWT (default 1 hour).

        ``refresh_token`` is a long-lived opaque token (default 30 days).

        The frontend should store both and use ``refresh_token`` to silently

        renew the access token when it receives a TOKEN_EXPIRED error.'
    ToolActionRequest:
      properties:
        load:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Load
