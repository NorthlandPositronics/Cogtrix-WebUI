openapi: 3.1.0
info:
  title: Cogtrix API
  description: REST + WebSocket API for the Cogtrix AI assistant platform. Powers
    the React web frontend with full access to sessions, messages, tools, memory,
    MCP servers, assistant mode, RAG, and system controls.
  version: 1.1.0
paths:
  /api/v1/health:
    get:
      tags:
      - Health
      summary: Liveness check
      description: Returns HTTP 200 as long as the API process is alive. No authentication
        required. Suitable for load balancer health probes.
      operationId: liveness_api_v1_health_get
      responses:
        '200':
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_HealthOut_'
  /api/v1/health/ready:
    get:
      tags:
      - Health
      summary: Readiness check
      description: 'Returns HTTP 200 when all critical components are healthy, HTTP
        503 when one or more are not. Checks: database connectivity. No authentication
        required.'
      operationId: readiness_api_v1_health_ready_get
      responses:
        '200':
          description: All components ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_ReadinessOut_'
        '503':
          description: One or more components not ready.
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register a new user account
      description: Create a new user account. Returns a token pair so the user can
        immediately start making authenticated requests. The first registered user
        is automatically granted the 'admin' role.
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Account created; token pair returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_TokenPair_'
        '409':
          description: Username or email already exists (VALIDATION_ERROR).
        '422':
          description: Request body validation failed (VALIDATION_ERROR).
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Authenticate and receive tokens
      description: Authenticate with username + password. Returns a short-lived access
        token (1 hour) and a long-lived refresh token (30 days). Store both; use the
        refresh token to silently renew the access token.
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Authenticated; token pair returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_TokenPair_'
        '401':
          description: Invalid credentials (UNAUTHORIZED).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - Authentication
      summary: Renew access token using refresh token
      description: Exchange a valid refresh token for a new access + refresh token
        pair. The old refresh token is invalidated on success (rotation). Call this
        endpoint when the frontend receives TOKEN_EXPIRED on any other endpoint.
      operationId: refresh_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: New token pair returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_TokenPair_'
        '401':
          description: Refresh token invalid or expired (TOKEN_EXPIRED).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - Authentication
      summary: Invalidate the current session
      description: Revoke the refresh token associated with the current session. The
        access token remains valid until it expires naturally.
      operationId: logout_api_v1_auth_logout_post
      security:
      - HTTPBearer: []
      parameters:
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      responses:
        '200':
          description: Refresh token revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_NoneType_'
        '401':
          description: Not authenticated (UNAUTHORIZED).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - Authentication
      summary: Get current user profile
      description: Return the profile of the currently authenticated user.
      operationId: get_me_api_v1_auth_me_get
      security:
      - HTTPBearer: []
      parameters:
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      responses:
        '200':
          description: User profile returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/src__api__schemas__common__APIResponse_UserOut___1'
        '401':
          description: Not authenticated (UNAUTHORIZED or TOKEN_EXPIRED).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/api-keys:
    get:
      tags:
      - Authentication
      summary: List API keys
      description: List all API keys owned by the current user. Key values are never
        returned — only the prefix.
      operationId: list_api_keys_api_v1_auth_api_keys_get
      security:
      - HTTPBearer: []
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      responses:
        '200':
          description: API key list returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_CursorPage_APIKeyOut__'
        '401':
          description: Not authenticated.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Authentication
      summary: Create an API key
      description: Create a new API key for programmatic access. The full key value
        is returned ONCE in this response and cannot be retrieved again. Store it
        immediately.
      operationId: create_api_key_api_v1_auth_api_keys_post
      security:
      - HTTPBearer: []
      parameters:
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIKeyCreateRequest'
      responses:
        '201':
          description: API key created; full key value in response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_APIKeyOut_'
        '401':
          description: Not authenticated.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/api-keys/{key_id}:
    delete:
      tags:
      - Authentication
      summary: Revoke an API key
      description: Permanently revoke an API key. Requests authenticated with this
        key will immediately receive 401.
      operationId: revoke_api_key_api_v1_auth_api_keys__key_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          title: Key Id
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      responses:
        '200':
          description: API key revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_NoneType_'
        '401':
          description: Not authenticated.
        '404':
          description: Key not found (NOT_FOUND).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sessions:
    post:
      tags:
      - Sessions
      summary: Create a new session
      description: Create a new agent session. The session starts in the 'idle' state
        with default config values inherited from the application config unless overridden
        in the request body. After creation, connect to the session WebSocket to stream
        agent output.
      operationId: create_session_api_v1_sessions_post
      security:
      - HTTPBearer: []
      parameters:
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequest'
      responses:
        '201':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_SessionOut_'
        '401':
          description: Not authenticated (UNAUTHORIZED or TOKEN_EXPIRED).
        '409':
          description: Duplicate session name (SESSION_NAME_DUPLICATE).
        '422':
          description: Request body validation failed (VALIDATION_ERROR).
    get:
      tags:
      - Sessions
      summary: List sessions
      description: List all sessions owned by the current user, ordered by last activity
        (newest first). Uses cursor-based pagination. Pass the returned next_cursor
        as the cursor query parameter to retrieve the next page.
      operationId: list_sessions_api_v1_sessions_get
      security:
      - HTTPBearer: []
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      - name: include_archived
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Archived
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      responses:
        '200':
          description: Session list returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_CursorPage_SessionOut__'
        '401':
          description: Not authenticated.
        '400':
          description: Invalid cursor (INVALID_CURSOR).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sessions/{session_id}:
    get:
      tags:
      - Sessions
      summary: Get session details
      description: Return full details for a single session including current config,
        agent state, active tools, and cumulative token counts.
      operationId: get_session_api_v1_sessions__session_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      responses:
        '200':
          description: Session details returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_SessionOut_'
        '401':
          description: Not authenticated.
        '403':
          description: Session belongs to another user (FORBIDDEN).
        '404':
          description: Session not found (SESSION_NOT_FOUND).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Sessions
      summary: Update session name or config
      description: Partially update a session. All fields are optional. Config changes
        (model, provider, memory_mode) take effect on the next agent turn. Changing
        provider or model invalidates the LLM bind-tools cache.
      operationId: patch_session_api_v1_sessions__session_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionPatchRequest'
      responses:
        '200':
          description: Session updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_SessionOut_'
        '401':
          description: Not authenticated.
        '403':
          description: Forbidden (FORBIDDEN).
        '404':
          description: Session not found (SESSION_NOT_FOUND).
        '422':
          description: Validation error (VALIDATION_ERROR).
    delete:
      tags:
      - Sessions
      summary: Terminate and archive a session
      description: Stop any in-progress agent turn, persist memory to disk, and archive
        the session. Archived sessions are excluded from list results by default but
        can be retrieved with include_archived=true. Memory data is retained for 30
        days after archival.
      operationId: delete_session_api_v1_sessions__session_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      responses:
        '200':
          description: Session archived.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_NoneType_'
        '401':
          description: Not authenticated.
        '403':
          description: Forbidden (FORBIDDEN).
        '404':
          description: Session not found (SESSION_NOT_FOUND).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sessions/{session_id}/messages:
    post:
      tags:
      - Messages
      summary: Send a user message and initiate an agent turn
      description: Submit a user message to the session. The message is persisted
        immediately and an agent turn is queued. Connect to the session WebSocket
        (WS /ws/v1/sessions/{id}) to receive streaming token output while the agent
        processes the request. The REST response returns the persisted user message
        — not the agent reply.
      operationId: send_message_api_v1_sessions__session_id__messages_post
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '202':
          description: Message accepted; agent turn queued. Stream output via WebSocket.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_MessageOut_'
        '401':
          description: Not authenticated.
        '403':
          description: Forbidden (FORBIDDEN).
        '404':
          description: Session not found (SESSION_NOT_FOUND).
        '409':
          description: Agent turn already in progress for this session.
        '422':
          description: Validation error (VALIDATION_ERROR).
    get:
      tags:
      - Messages
      summary: List message history
      description: List the conversation history for a session ordered chronologically
        (oldest first). Uses cursor-based pagination. AI messages include embedded
        tool_calls records. Pass next_cursor from the response as the cursor parameter
        for the next page.
      operationId: list_messages_api_v1_sessions__session_id__messages_get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      responses:
        '200':
          description: Message history returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_CursorPage_MessageOut__'
        '401':
          description: Not authenticated.
        '403':
          description: Forbidden (FORBIDDEN).
        '404':
          description: Session not found (SESSION_NOT_FOUND).
        '400':
          description: Invalid cursor (INVALID_CURSOR).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Messages
      summary: Clear conversation history
      description: Clear the conversation history for a session. Optionally keep the
        last N messages with keep_last. Memory summaries and vector index are also
        reset unless keep_last > 0.
      operationId: clear_history_api_v1_sessions__session_id__messages_delete
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/ClearHistoryRequest'
              - type: 'null'
              title: Body
      responses:
        '200':
          description: History cleared.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_NoneType_'
        '401':
          description: Not authenticated.
        '403':
          description: Forbidden (FORBIDDEN).
        '404':
          description: Session not found (SESSION_NOT_FOUND).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sessions/{session_id}/memory:
    get:
      tags:
      - Memory
      summary: Get memory state
      description: 'Return the current memory snapshot for a session: active mode,
        the LLM-generated summary of older messages, sliding window size, token usage,
        and mode-specific metadata (goals, code tasks, entities, etc.).'
      operationId: get_memory_api_v1_sessions__session_id__memory_get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      responses:
        '200':
          description: Memory state returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_MemoryStateOut_'
        '401':
          description: Not authenticated.
        '403':
          description: Forbidden (FORBIDDEN).
        '404':
          description: Session not found (SESSION_NOT_FOUND).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Memory
      summary: Clear session memory
      description: 'Clear the full conversation memory for a session: wipe the sliding
        window, the summary, the vector recall index, and all mode-specific state.
        The session config (provider, model, memory mode) is preserved. Equivalent
        to the /clear CLI command.'
      operationId: clear_memory_api_v1_sessions__session_id__memory_delete
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      responses:
        '200':
          description: Memory cleared.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_NoneType_'
        '401':
          description: Not authenticated.
        '403':
          description: Forbidden (FORBIDDEN).
        '404':
          description: Session not found (SESSION_NOT_FOUND).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Memory
      summary: Switch memory mode
      description: 'Switch the active memory mode for a session. Valid modes: ''conversation''
        (sliding window + summarization of chat history), ''code'' (preserves code
        tasks, file paths, and edit history), ''reasoning'' (tracks goals, decisions,
        and reasoning chains). Switching mode does not clear existing memory — context
        is migrated. Equivalent to the /mode CLI command.'
      operationId: switch_memory_mode_api_v1_sessions__session_id__memory_patch
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JWT for WebSocket connections that cannot set headers.
          title: Token
        description: JWT for WebSocket connections that cannot set headers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryModeSwitchRequest'
      responses:
        '200':
          description: Memory mode switched; updated memory state returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse_MemoryStateOut_'
        '401':
          description: Not authenticated.
        '403':
          description: Forbidden (FORBIDDEN).
        '404':
          description: Session not found (SESSION_NOT_FOUND).
        '422':
          description: Validation error (VALIDATION_ERROR).
  /api/v1/tools:
    get:
      tags:
      - Tools
      summary: List all available tools
      description: List every tool registered in the global tool registry — both built-in
        tools and any tools discovered from connected MCP servers. Status tags reflect
        the default state (not session-specific). Use GET /sessions/{id}/tools to
        see per-session status.
      operationId: list_tools_api_v1_tools_get
      security:
      - HTTPBearer: []
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
