          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Send At
          description: New delivery UTC timestamp; null leaves unchanged.
      type: object
      title: ScheduledMessageEditRequest
      description: Request body for PATCH /api/v1/assistant/scheduled/{id}.
    ScheduledMessageOut:
      properties:
        id:
          type: string
          title: Id
          description: UUID v4 message ID.
        chat_id:
          type: string
          title: Chat Id
          description: Target chat identifier.
        channel:
          type: string
          title: Channel
          description: Target channel name.
        recipient:
          type: string
          title: Recipient
          description: Human-readable recipient (resolved phone / name / chat_id).
        text:
          type: string
          title: Text
          description: Message text to send.
        send_at:
          type: string
          format: date-time
          title: Send At
          description: Scheduled delivery UTC timestamp.
        created_at:
          type: string
          format: date-time
          title: Created At
          description: UTC creation timestamp.
        attempts:
          type: integer
          title: Attempts
          description: Delivery attempt count.
          examples:
          - 0
        max_attempts:
          type: integer
          title: Max Attempts
          description: Maximum allowed delivery attempts.
          examples:
          - 3
        status:
          type: string
          enum:
          - pending
          - firing
          - sent
          - failed
          - cancelled
          title: Status
          description: Delivery status.
      type: object
      required:
      - id
      - chat_id
      - channel
      - recipient
      - text
      - send_at
      - created_at
      - attempts
      - max_attempts
      - status
