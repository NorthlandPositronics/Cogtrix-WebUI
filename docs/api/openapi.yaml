          examples:
          - my-mcp-server
        transport:
          type: string
          enum:
          - stdio
          - sse
          title: Transport
          description: Transport type.
          examples:
          - stdio
        url:
          anyOf:
          - type: string
          - type: 'null'
          title: Url
          description: SSE endpoint URL (required for sse transport).
        command:
          anyOf:
          - type: string
          - type: 'null'
          title: Command
          description: Subprocess command (required for stdio transport).
          examples:
          - npx
        args:
          items:
            type: string
          type: array
          title: Args
          description: Subprocess arguments.
          examples:
          - - '@modelcontextprotocol/server-filesystem'
            - /data
