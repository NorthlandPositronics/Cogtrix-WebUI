          examples:
          - 7a3c1b2e-5d4f-11ee-be56-0242ac120002
        session_id:
          type: string
          title: Session Id
          description: UUID v4 of the session this message belongs to.
        role:
          type: string
          enum:
          - user
          - assistant
          - system
          - tool
          title: Role
          description: 'Message role: ''user'', ''assistant'', ''tool'', or ''system''.'
          examples:
          - user
        content:
          type: string
          title: Content
          description: Text content of the message.
          examples:
          - What is the capital of France?
        tool_calls:
          items:
            $ref: '#/components/schemas/ToolCallRecord'
          type: array
          title: Tool Calls
          description: Tool calls emitted during this message (assistant messages
            only).
        token_counts:
          anyOf:
          - additionalProperties:
              type: integer
            type: object
          - type: 'null'
          title: Token Counts
          description: 'Per-message token breakdown: {input, output}.'
          examples:
          - input: 320
            output: 88
        created_at:
          type: string
          format: date-time
          title: Created At
          description: UTC timestamp when the message was created.
      type: object
      required:
      - id
      - session_id
      - role
      - content
      - created_at
      title: MessageOut
      description: 'A single message in the conversation history.


        ``role`` is ''user'' for human input, ''assistant'' for agent responses,

        ''tool'' for tool result summaries, and ''system'' for injected context.

        ``tool_calls`` is non-empty only on ''assistant'' messages where the agent

        invoked one or more tools.'
