      description: Request body for PATCH /api/v1/sessions/{id}/memory.
    MemoryStateOut:
      properties:
        session_id:
          type: string
          title: Session Id
          description: UUID v4 of the owning session.
        mode:
          type: string
          enum:
          - conversation
          - code
          - reasoning
          title: Mode
          description: Active memory mode.
          examples:
          - conversation
        summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Summary
          description: LLM-generated summary of messages outside the sliding window;
            null when empty.
        window_messages:
          type: integer
          title: Window Messages
          description: Number of messages kept verbatim in the sliding window.
          examples:
          - 20
        summarized_messages:
          type: integer
          title: Summarized Messages
          description: Number of messages compressed into the summary.
          examples:
          - 45
        tokens_used:
          type: integer
          title: Tokens Used
          description: Estimated token count of the current serialized context.
          examples:
          - 8400
        context_window:
          type: integer
          title: Context Window
          description: Maximum context window for the current model (tokens).
          examples:
          - 131072
        vector_recall_enabled:
          type: boolean
          title: Vector Recall Enabled
          description: True when the optional vector recall index is active.
        mode_meta:
          additionalProperties: true
          type: object
          title: Mode Meta
          description: 'Mode-specific metadata: goals/decisions for reasoning mode,
            code tasks for code mode, entities for conversation mode.'
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: UTC timestamp of the last memory update.
      type: object
      required:
      - session_id
      - mode
      - window_messages
      - summarized_messages
      - tokens_used
      - context_window
      - vector_recall_enabled
      - updated_at
      title: MemoryStateOut
      description: 'Current memory state for a session.


        ``mode`` is the active memory strategy.

        ``summary`` is the most recent LLM-generated summary of older messages.

        ``window_messages`` is the count of messages kept verbatim in the sliding
        window.

        ``summarized_messages`` is the count of messages compressed into the summary.

        ``tokens_used`` is the estimated token count of the current context.

        ``vector_recall_enabled`` indicates whether evicted messages are embedded
        for retrieval.

        ``mode_meta`` contains mode-specific state (goals for reasoning mode, code
        tasks, etc.).'
    MessageOut:
      properties:
        id:
          type: string
          title: Id
