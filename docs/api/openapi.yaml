      description: A pending scheduled message.
    SendMessageRequest:
      properties:
        content:
          type: string
          maxLength: 65536
          minLength: 1
          title: Content
          description: User message text.
          examples:
          - What is the capital of France?
        mode:
          type: string
          enum:
          - normal
          - think
          - delegate
          title: Mode
          description: 'Agent execution mode: ''normal'' for standard turn, ''think''
            to force the deep-think pipeline, ''delegate'' to force research delegation.'
          default: normal
          examples:
          - normal
        optimize_prompt:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Optimize Prompt
          description: Override session-level prompt_optimizer for this turn only;
            null uses session setting.
      type: object
      required:
      - content
      title: SendMessageRequest
      description: 'Request body for POST /api/v1/sessions/{id}/messages.


        Initiates an agent turn.  The response is the queued user message;

        the agent reply streams over the WebSocket connection for this session.'
    SessionConfig:
      properties:
        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
          description: Model alias from the models registry or raw model name.
          examples:
          - gpt-4.1-mini
        memory_mode:
          anyOf:
          - type: string
            enum:
            - conversation
            - code
            - reasoning
          - type: 'null'
          title: Memory Mode
          description: 'Memory strategy: ''conversation'', ''code'', or ''reasoning''.'
          examples:
          - conversation
        system_prompt:
          anyOf:
          - type: string
            maxLength: 32768
          - type: 'null'
          title: System Prompt
          description: Override the default system prompt for this session.
        prompt_optimizer:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Prompt Optimizer
          description: Enable/disable the one-shot prompt rewriter for this session.
        parallel_tool_execution:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Parallel Tool Execution
          description: Enable/disable parallel tool execution for this session.
        context_compression:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Context Compression
          description: Enable/disable context compression for this session.
        max_steps:
          anyOf:
          - type: integer
            maximum: 200.0
            minimum: 1.0
          - type: 'null'
          title: Max Steps
          description: Maximum agent steps (tool calls) per turn.
          examples:
          - 25
      type: object
      title: SessionConfig
      description: Mutable session configuration settable at creation and via PATCH.
    SessionCreateRequest:
      properties:
        name:
          type: string
          maxLength: 256
          title: Name
