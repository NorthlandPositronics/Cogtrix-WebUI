      description: Request body for POST /api/v1/mcp/servers.
    MCPServerOut:
      properties:
        name:
          type: string
          title: Name
          description: Server alias (config key).
          examples:
          - my-mcp-server
        status:
          type: string
          enum:
          - connected
          - disconnected
          - error
          - connecting
          title: Status
          description: Current connection status.
          examples:
          - connected
        transport:
          type: string
          enum:
          - stdio
          - sse
          title: Transport
          description: 'Transport type: stdio (subprocess) or sse (HTTP).'
          examples:
          - stdio
        url:
          anyOf:
          - type: string
          - type: 'null'
          title: Url
          description: SSE endpoint URL (sse transport only).
        command:
          anyOf:
          - type: string
          - type: 'null'
          title: Command
          description: Subprocess command (stdio transport only).
          examples:
          - npx
        args:
          items:
            type: string
          type: array
          title: Args
          description: Subprocess arguments (stdio transport only).
          examples:
          - - '@modelcontextprotocol/server-filesystem'
            - /data
        requires_confirmation:
          type: boolean
          title: Requires Confirmation
          description: True when all tools from this server require confirmation before
            use.
        tools:
          items:
            $ref: '#/components/schemas/MCPToolSummary'
          type: array
          title: Tools
          description: Tools discovered from this server; empty when disconnected.
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
          description: Last connection error message; null when connected.
        connected_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Connected At
          description: UTC timestamp of the last successful connection.
