          examples:
          - - web_search
            - read_file
        unload:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Unload
          description: Tool names to move back from active to on-demand.
          examples:
          - - read_file
        enable:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Enable
          description: Tool names to re-enable after being disabled.
          examples:
          - - shell
        disable:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Disable
          description: Tool names to disable (block) for this session.
          examples:
          - - shell
        auto_approve:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Auto Approve
          description: Tool names to auto-approve (skip confirmation) for this session.
          examples:
          - - web_search
        revoke_approval:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Revoke Approval
          description: Tool names to remove from the auto-approved set.
          examples:
          - - web_search
      type: object
      title: ToolActionRequest
      description: 'Request body for PATCH /api/v1/sessions/{id}/tools.


        Supply exactly one of the action fields; the rest should be omitted or null.'
    ToolCallRecord:
      properties:
        tool_call_id:
          type: string
          title: Tool Call Id
          description: Unique ID assigned by the LLM for this tool call.
          examples:
          - call_abc123
        tool_name:
          type: string
          title: Tool Name
          description: Name of the tool that was invoked.
          examples:
          - web_search
        input:
          additionalProperties: true
          type: object
          title: Input
          description: Arguments passed to the tool.
        output:
          anyOf:
          - type: string
          - type: 'null'
          title: Output
          description: Tool output string; null if the call is still in progress.
        duration_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Duration Ms
          description: Tool execution duration in milliseconds.
          examples:
          - 340
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
          description: Error string if the tool call failed; null on success.
      type: object
      required:
      - tool_call_id
      - tool_name
      - input
      title: ToolCallRecord
      description: A single tool invocation embedded inside an AI message.
    ToolOut:
      properties:
        name:
          type: string
          title: Name
          description: Tool identifier (snake_case).
          examples:
          - web_search
        description:
          type: string
          title: Description
          description: Full tool description shown to the LLM and in the UI.
          examples:
          - Search the web using the configured search provider.
        short_description:
          type: string
          title: Short Description
          description: One-line summary (≤120 chars).
          examples:
          - Search the web.
        status:
          type: string
          enum:
          - active
          - on_demand
          - disabled
          - auto_approved
          - pinned
          title: Status
          description: Current tool status within the session.
          examples:
          - on_demand
        requires_confirmation:
          type: boolean
          title: Requires Confirmation
          description: True when the tool requires human confirmation before execution.
        parameters:
          items:
            $ref: '#/components/schemas/ToolParameterSchema'
          type: array
          title: Parameters
          description: Tool input parameter schemas.
        module:
          anyOf:
          - type: string
          - type: 'null'
          title: Module
          description: Source module name (e.g. 'web_search', 'file_ops').
          examples:
          - web_search
        is_mcp:
          type: boolean
          title: Is Mcp
          description: True when this tool comes from an MCP server.
          default: false
        mcp_server:
          anyOf:
          - type: string
          - type: 'null'
          title: Mcp Server
          description: MCP server name when is_mcp is true; null for built-in tools.
      type: object
      required:
      - name
      - description
      - short_description
      - status
      - requires_confirmation
      title: ToolOut
      description: 'Full tool representation including parameter schema.


        ``status`` reflects the tool''s current state within the session:

        - ''active''       — loaded in the agent''s active tool set (agent-loaded,
        ephemeral)

        - ''pinned''       — manually loaded via API or CLI (persists across prompt
        cycles)

        - ''on_demand''    — available in the catalog, not yet loaded

        - ''disabled''     — blocked for this session

        - ''auto_approved''— active and pre-approved (no confirmation required)'
    ToolParameterSchema:
      properties:
        name:
          type: string
          title: Name
          description: Parameter name.
          examples:
          - query
        type:
          type: string
          title: Type
          description: JSON Schema type string (string, integer, boolean, array, object).
          examples:
          - string
        description:
          type: string
          title: Description
          description: Human-readable parameter description.
          examples:
          - The search query string.
        required:
          type: boolean
          title: Required
          description: Whether this parameter must be supplied on every call.
        default:
          anyOf:
          - {}
          - type: 'null'
          title: Default
          description: Default value when the parameter is omitted (null if required).
        enum:
          anyOf:
          - items: {}
            type: array
          - type: 'null'
          title: Enum
          description: Allowed values when the parameter is an enum; null otherwise.
      type: object
      required:
      - name
      - type
      - description
      - required
      title: ToolParameterSchema
      description: JSON Schema description of a single tool parameter.
    ToolSummary:
      properties:
        name:
          type: string
          title: Name
          description: Tool identifier.
          examples:
          - web_search
        short_description:
          type: string
          title: Short Description
          description: One-line summary.
          examples:
          - Search the web.
        status:
          type: string
          enum:
          - active
          - on_demand
          - disabled
          - auto_approved
          - pinned
          title: Status
          description: Current tool status.
          examples:
          - on_demand
        requires_confirmation:
          type: boolean
          title: Requires Confirmation
          description: True when confirmation is required before execution.
        is_mcp:
          type: boolean
          title: Is Mcp
          description: True when this tool comes from an MCP server.
          default: false
      type: object
      required:
      - name
      - short_description
      - status
      - requires_confirmation
      title: ToolSummary
      description: Lightweight tool entry for list responses.
    UserCreateRequest:
