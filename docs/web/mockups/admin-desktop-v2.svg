<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900"
  font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif">
  <desc>
  Component: Admin page — 3-tab layout (System, Live Logs, Users). DS v3.10 (2026-03-25). Supersedes admin-desktop.svg.
  Page: /admin (admin role required)
  Design system version: 3.10 (2026-03-25)
  Artboards: desktop 1440×900px
  </desc>

  <!-- Page background -->
  <rect width="1440" height="900" fill="#ffffff"/>

  <!-- ===================== SIDEBAR ===================== -->
  <g id="layer-sidebar">
    <rect x="0" y="0" width="220" height="900" fill="#fafafa"/>
    <line x1="220" y1="0" x2="220" y2="900" stroke="#e4e4e7" stroke-width="1"/>

    <!-- C-mark logomark -->
    <g transform="translate(16, 14)">
      <path d="M 18.071 5.929 A 10 10 0 1 0 18.071 18.071"
            fill="none" stroke="#0d9488" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="18.071" cy="5.929" r="2.2" fill="#0d9488"/>
      <circle cx="18.071" cy="18.071" r="1.6" fill="#0d9488"/>
    </g>
    <text x="46" y="30" font-size="18" font-weight="600" fill="#18181b">Cogtrix</text>

    <!-- Separator -->
    <line x1="0" y1="56" x2="220" y2="56" stroke="#e4e4e7" stroke-width="1"/>

    <!-- Nav: Sessions — inactive -->
    <rect x="8" y="64" width="204" height="36" rx="6" fill="none"/>
    <g transform="translate(19, 76)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 0 0 L 0 10 L 4 10 L 4 14 L 8 10 L 14 10 L 14 0 Z"/>
    </g>
    <text x="40" y="86" font-size="14" font-weight="400" fill="#71717a">Sessions</text>

    <!-- Nav: Chat — inactive -->
    <rect x="8" y="108" width="204" height="36" rx="6" fill="none"/>
    <g transform="translate(19, 120)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="3" width="12" height="10" rx="2"/>
      <path d="M 5 3 L 5 1 M 9 3 L 9 1"/>
      <circle cx="5" cy="8" r="1" fill="#71717a" stroke="none"/>
      <circle cx="9" cy="8" r="1" fill="#71717a" stroke="none"/>
    </g>
    <text x="40" y="130" font-size="14" font-weight="400" fill="#71717a">Chat</text>

    <!-- Nav: Documents — inactive -->
    <rect x="8" y="152" width="204" height="36" rx="6" fill="none"/>
    <g transform="translate(19, 164)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 2 0 L 9 0 L 14 5 L 14 14 L 2 14 Z"/>
      <path d="M 9 0 L 9 5 L 14 5"/>
      <line x1="4" y1="8" x2="10" y2="8"/>
      <line x1="4" y1="11" x2="8" y2="11"/>
    </g>
    <text x="40" y="174" font-size="14" font-weight="400" fill="#71717a">Documents</text>

    <!-- Nav: Settings — inactive -->
    <rect x="8" y="196" width="204" height="36" rx="6" fill="none"/>
    <g transform="translate(19, 208)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="7" cy="7" r="2.5"/>
      <path d="M 7 0 L 7 2 M 7 12 L 7 14 M 0 7 L 2 7 M 12 7 L 14 7 M 2.05 2.05 L 3.46 3.46 M 10.54 10.54 L 11.95 11.95 M 2.05 11.95 L 3.46 10.54 M 10.54 3.46 L 11.95 2.05"/>
    </g>
    <text x="40" y="218" font-size="14" font-weight="400" fill="#71717a">Settings</text>

    <!-- Nav: Assistant — inactive -->
    <rect x="8" y="240" width="204" height="36" rx="6" fill="none"/>
    <g transform="translate(19, 252)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="7" cy="7" r="6"/>
      <line x1="7" y1="3" x2="7" y2="7"/>
      <circle cx="7" cy="10" r="0.75" fill="#71717a" stroke="none"/>
    </g>
    <text x="40" y="262" font-size="14" font-weight="400" fill="#71717a">Assistant</text>

    <!-- Nav: Admin — ACTIVE: bg-teal-50 + left bar -->
    <rect x="8" y="284" width="204" height="36" rx="6" fill="#f0fdfa"/>
    <rect x="8" y="284" width="2" height="36" rx="1" fill="#0d9488"/>
    <g transform="translate(19, 296)" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="7" cy="5" r="4"/>
      <path d="M 0 14 C 0 11 3 9 7 9 C 11 9 14 11 14 14"/>
    </g>
    <text x="40" y="306" font-size="14" font-weight="500" fill="#0d9488">Admin</text>

    <!-- Bottom user info -->
    <line x1="0" y1="840" x2="220" y2="840" stroke="#e4e4e7" stroke-width="1"/>
    <circle cx="24" cy="866" r="14" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
    <text x="24" y="870" font-size="10" font-weight="600" fill="#71717a" text-anchor="middle">A</text>
    <text x="46" y="860" font-size="12" font-weight="500" fill="#18181b">admin</text>
    <rect x="46" y="865" width="40" height="16" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1"/>
    <text x="66" y="877" font-size="11" font-weight="500" fill="#0d9488" text-anchor="middle">admin</text>
    <g transform="translate(194, 858)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 9 3 L 14 3 L 14 13 L 9 13"/>
      <path d="M 0 8 L 10 8 M 7 5 L 10 8 L 7 11"/>
    </g>
  </g>

  <!-- ===================== PAGE HEADER ===================== -->
  <g id="layer-header">
    <rect x="220" y="0" width="1220" height="56" fill="#ffffff"/>
    <line x1="220" y1="56" x2="1440" y2="56" stroke="#e4e4e7" stroke-width="1"/>
    <text x="240" y="34" font-size="24" font-weight="600" fill="#18181b">Admin</text>
  </g>

  <!-- ===================== TABS STRIP ===================== -->
  <!-- TabsList: h-9 inline-flex rounded-lg bg-zinc-100 p-1, at y=64 (below header + 8px gap) -->
  <g id="layer-tabs">
    <!-- TabsList background pill -->
    <rect x="240" y="68" width="296" height="36" rx="8" fill="#f4f4f5"/>

    <!-- Tab: System — ACTIVE -->
    <!-- TabsTrigger active: bg-white shadow-sm rounded-md text-teal-600 font-medium -->
    <rect x="244" y="72" width="88" height="28" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="0.5"/>
    <text x="288" y="90" font-size="13" font-weight="500" fill="#0d9488" text-anchor="middle">System</text>

    <!-- Tab: Live Logs — inactive -->
    <rect x="336" y="72" width="92" height="28" rx="6" fill="none"/>
    <text x="382" y="90" font-size="13" font-weight="400" fill="#71717a" text-anchor="middle">Live Logs</text>

    <!-- Tab: Users — inactive -->
    <rect x="432" y="72" width="72" height="28" rx="6" fill="none"/>
    <text x="468" y="90" font-size="13" font-weight="400" fill="#71717a" text-anchor="middle">Users</text>
  </g>

  <!-- ===================== CONTENT AREA ===================== -->
  <g id="layer-content">
    <rect x="220" y="112" width="1220" height="788" fill="#ffffff"/>

    <!-- ── Frame 1: System tab (active, shown in main content area) ── -->
    <g id="tab-system">
      <text x="240" y="134" font-size="11" font-weight="500" fill="#a1a1aa" letter-spacing="0.06em">ACTIVE TAB: SYSTEM</text>

      <!-- SystemInfoCard: Card component -->
      <rect x="240" y="144" width="480" height="252" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>

      <!-- Card header -->
      <text x="264" y="172" font-size="16" font-weight="600" fill="#18181b">System Information</text>
      <line x1="240" y1="184" x2="720" y2="184" stroke="#e4e4e7" stroke-width="1"/>

      <!-- Info rows: grid key/value pairs -->
      <!-- Row 1: Version -->
      <text x="264" y="212" font-size="14" font-weight="500" fill="#18181b">Version</text>
      <text x="440" y="212" font-size="14" font-weight="400" fill="#52525b">1.4.2</text>

      <!-- Row 2: Uptime -->
      <text x="264" y="240" font-size="14" font-weight="500" fill="#18181b">Uptime</text>
      <text x="440" y="240" font-size="14" font-weight="400" fill="#52525b">3d 14h 22m</text>

      <!-- Row 3: Python -->
      <text x="264" y="268" font-size="14" font-weight="500" fill="#18181b">Python</text>
      <text x="440" y="268" font-size="14" font-weight="400" fill="#52525b">3.12.2</text>

      <!-- Row 4: OS -->
      <text x="264" y="296" font-size="14" font-weight="500" fill="#18181b">OS</text>
      <text x="440" y="296" font-size="14" font-weight="400" fill="#52525b">Linux 6.5.0-amd64</text>

      <!-- Row 5: Memory usage -->
      <text x="264" y="324" font-size="14" font-weight="500" fill="#18181b">Memory</text>
      <text x="440" y="324" font-size="14" font-weight="400" fill="#52525b">1.8 GB / 8.0 GB (22.5%)</text>

      <!-- Row 6: Active sessions -->
      <text x="264" y="352" font-size="14" font-weight="500" fill="#18181b">Active sessions</text>
      <text x="440" y="352" font-size="14" font-weight="400" fill="#52525b">3</text>
    </g>

    <!-- ── Frame 2: Live Logs tab (shown as labeled frame to right) ── -->
    <g id="tab-live-logs">
      <text x="760" y="134" font-size="11" font-weight="500" fill="#a1a1aa" letter-spacing="0.06em">TAB FRAME: LIVE LOGS</text>

      <!-- LiveLogViewer Card -->
      <rect x="760" y="144" width="640" height="360" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>

      <!-- Card header row: title + level Select + Connect button -->
      <text x="784" y="172" font-size="16" font-weight="600" fill="#18181b">Live Logs</text>

      <!-- Level Select: h-8 w-28 -->
      <rect x="996" y="156" width="108" height="32" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
      <text x="1008" y="176" font-size="12" font-weight="400" fill="#18181b">All levels</text>
      <g transform="translate(1088, 167)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="0,0 4,5 8,0"/>
      </g>

      <!-- Connect button: size=sm variant=outline text-teal-600 border-teal-200 -->
      <rect x="1112" y="156" width="76" height="32" rx="6" fill="#ffffff" stroke="#99f6e4" stroke-width="1"/>
      <text x="1150" y="176" font-size="12" font-weight="500" fill="#0d9488" text-anchor="middle">Connect</text>

      <line x1="760" y1="200" x2="1400" y2="200" stroke="#e4e4e7" stroke-width="1"/>

      <!-- Log output area: rounded-md border bg-zinc-50 font-mono text-xs p-3 -->
      <rect x="784" y="212" width="592" height="268" rx="6" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>

      <!-- Monospace log lines -->
      <text x="800" y="232" font-size="11" font-family="'Geist Mono', 'Courier New', monospace" fill="#71717a">2026-03-25 14:22:01  INFO  API request: GET /health → 200 OK (2ms)</text>
      <text x="800" y="250" font-size="11" font-family="'Geist Mono', 'Courier New', monospace" fill="#71717a">2026-03-25 14:22:03  INFO  WebSocket connected: session_id=a1b2c3d4</text>
      <text x="800" y="268" font-size="11" font-family="'Geist Mono', 'Courier New', monospace" fill="#0d9488">2026-03-25 14:22:04  DEBUG Streaming token batch: 12 tokens</text>
      <text x="800" y="286" font-size="11" font-family="'Geist Mono', 'Courier New', monospace" fill="#71717a">2026-03-25 14:22:05  INFO  Tool call: web_search(query="neural networks")</text>
      <text x="800" y="304" font-size="11" font-family="'Geist Mono', 'Courier New', monospace" fill="#b45309">2026-03-25 14:22:06  WARN  Rate limit approaching: 85% of quota used</text>
      <text x="800" y="322" font-size="11" font-family="'Geist Mono', 'Courier New', monospace" fill="#dc2626">2026-03-25 14:22:08  ERROR Provider error: upstream timeout after 30s</text>
      <text x="800" y="340" font-size="11" font-family="'Geist Mono', 'Courier New', monospace" fill="#71717a">2026-03-25 14:22:09  INFO  Retry attempt 1/3</text>
      <text x="800" y="358" font-size="11" font-family="'Geist Mono', 'Courier New', monospace" fill="#71717a">2026-03-25 14:22:11  INFO  Session message saved: msg_id=8f3a2b1c</text>
      <!-- Streaming cursor on last line -->
      <rect x="800" y="370" width="2" height="14" fill="#0d9488" opacity="0.8"/>
    </g>

    <!-- ── Frame 3: Users tab (shown as labeled frame below) ── -->
    <g id="tab-users">
      <text x="240" y="424" font-size="11" font-weight="500" fill="#a1a1aa" letter-spacing="0.06em">TAB FRAME: USERS</text>

      <!-- UserManagementPanel Card -->
      <rect x="240" y="434" width="1160" height="292" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>

      <!-- Card heading -->
      <text x="264" y="462" font-size="16" font-weight="600" fill="#18181b">User Management</text>
      <line x1="240" y1="474" x2="1400" y2="474" stroke="#e4e4e7" stroke-width="1"/>

      <!-- Table header row -->
      <rect x="240" y="474" width="1160" height="36" fill="#fafafa"/>
      <text x="264" y="497" font-size="12" font-weight="500" fill="#71717a">Username</text>
      <text x="464" y="497" font-size="12" font-weight="500" fill="#71717a">Email</text>
      <text x="744" y="497" font-size="12" font-weight="500" fill="#71717a">Admin</text>
      <text x="864" y="497" font-size="12" font-weight="500" fill="#71717a">Created</text>
      <text x="1104" y="497" font-size="12" font-weight="500" fill="#71717a">Actions</text>
      <line x1="240" y1="510" x2="1400" y2="510" stroke="#e4e4e7" stroke-width="1"/>

      <!-- Row 1: admin user -->
      <rect x="240" y="510" width="1160" height="52" fill="#ffffff"/>
      <text x="264" y="540" font-size="14" font-weight="500" fill="#18181b">admin</text>
      <text x="464" y="540" font-size="14" font-weight="400" fill="#52525b">admin@cogtrix.io</text>
      <!-- Admin badge: teal -->
      <rect x="744" y="527" width="48" height="20" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1"/>
      <text x="768" y="541" font-size="11" font-weight="500" fill="#0d9488" text-anchor="middle">Admin</text>
      <text x="864" y="540" font-size="14" font-weight="400" fill="#52525b">Mar 15, 2026</text>
      <!-- Actions: self — no demote or delete for self -->
      <text x="1104" y="540" font-size="12" font-weight="400" fill="#a1a1aa">—</text>
      <line x1="240" y1="562" x2="1400" y2="562" stroke="#e4e4e7" stroke-width="1"/>

      <!-- Row 2: regular user alice -->
      <rect x="240" y="562" width="1160" height="52" fill="#ffffff"/>
      <text x="264" y="592" font-size="14" font-weight="500" fill="#18181b">alice</text>
      <text x="464" y="592" font-size="14" font-weight="400" fill="#52525b">alice@example.com</text>
      <!-- User badge: zinc -->
      <rect x="744" y="579" width="44" height="20" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
      <text x="766" y="593" font-size="11" font-weight="500" fill="#52525b" text-anchor="middle">User</text>
      <text x="864" y="592" font-size="14" font-weight="400" fill="#52525b">Mar 20, 2026</text>
      <!-- Action: Promote + Delete ghost buttons -->
      <rect x="1104" y="576" width="120" height="28" rx="6" fill="none" stroke="#e4e4e7" stroke-width="1"/>
      <text x="1164" y="594" font-size="12" font-weight="400" fill="#52525b" text-anchor="middle">Promote to Admin</text>
      <rect x="1236" y="576" width="60" height="28" rx="6" fill="none"/>
      <text x="1266" y="594" font-size="12" font-weight="400" fill="#dc2626" text-anchor="middle">Delete</text>
      <line x1="240" y1="614" x2="1400" y2="614" stroke="#e4e4e7" stroke-width="1"/>

      <!-- Row 3: regular user bob -->
      <rect x="240" y="614" width="1160" height="52" fill="#ffffff"/>
      <text x="264" y="644" font-size="14" font-weight="500" fill="#18181b">bob</text>
      <text x="464" y="644" font-size="14" font-weight="400" fill="#52525b">bob@example.com</text>
      <rect x="744" y="631" width="44" height="20" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
      <text x="766" y="645" font-size="11" font-weight="500" fill="#52525b" text-anchor="middle">User</text>
      <text x="864" y="644" font-size="14" font-weight="400" fill="#52525b">Mar 22, 2026</text>
      <rect x="1104" y="628" width="120" height="28" rx="6" fill="none" stroke="#e4e4e7" stroke-width="1"/>
      <text x="1164" y="646" font-size="12" font-weight="400" fill="#52525b" text-anchor="middle">Promote to Admin</text>
      <rect x="1236" y="628" width="60" height="28" rx="6" fill="none"/>
      <text x="1266" y="646" font-size="12" font-weight="400" fill="#dc2626" text-anchor="middle">Delete</text>
    </g>

  </g>

  <!-- ===================== ANNOTATIONS ===================== -->
  <g id="annotations" font-family="'Geist Mono', 'Courier New', monospace">
    <!-- Header annotation -->
    <text x="224" y="892" font-size="10" fill="#71717a">Header: h-14 (56px) bg-white border-b  |  Tabs: TabsList bg-zinc-100 rounded-lg p-1  |  Active tab: bg-white shadow-sm text-teal-600 font-medium</text>
    <!-- Tab indicator note -->
    <line x1="288" y1="104" x2="288" y2="112" stroke="#0d9488" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="288" y="112" font-size="10" fill="#0d9488" text-anchor="middle">active</text>
    <line x1="382" y1="104" x2="382" y2="112" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="382" y="112" font-size="10" fill="#a1a1aa" text-anchor="middle">inactive</text>
    <line x1="468" y1="104" x2="468" y2="112" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="468" y="112" font-size="10" fill="#a1a1aa" text-anchor="middle">inactive</text>
  </g>

</svg>
