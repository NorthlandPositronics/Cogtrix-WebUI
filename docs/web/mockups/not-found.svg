<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif">
  <desc>
  Component: 404 Not Found page
  Page: * (catch-all route)
  Design system version: 3.6 (2026-03-23)
  Artboards: desktop 1440×900px
  </desc>

  <!-- Page background: bg-zinc-50 -->
  <rect width="1440" height="900" fill="#fafafa"/>

  <!-- Centered content block — flex items-center justify-center -->
  <g id="layer-content" transform="translate(720, 450)">

    <!-- FileQuestion icon 48×48, text-zinc-400, strokeWidth=1.5 -->
    <g transform="translate(-24, -160)" fill="none" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Document outline -->
      <path d="M6 2 L30 2 L42 14 L42 46 L6 46 Z"/>
      <!-- Fold corner -->
      <polyline points="30,2 30,14 42,14"/>
      <!-- Question mark body -->
      <path d="M18 20 Q18 16 24 16 Q30 16 30 21 Q30 25 24 26 L24 30"/>
      <!-- Question mark dot -->
      <circle cx="24" cy="36" r="1.5" fill="#a1a1aa" stroke="none"/>
    </g>

    <!-- "404" — text-3xl font-bold text-zinc-900 -->
    <text x="0" y="-82" font-size="30" font-weight="700" fill="#18181b" text-anchor="middle" dominant-baseline="middle">404</text>

    <!-- "Page not found" — text-xl text-zinc-500 -->
    <text x="0" y="-46" font-size="20" font-weight="400" fill="#71717a" text-anchor="middle" dominant-baseline="middle">Page not found</text>

    <!-- Brief message — text-sm text-zinc-500, max-w-sm text-center -->
    <text x="0" y="-10" font-size="14" font-weight="400" fill="#71717a" text-anchor="middle" dominant-baseline="middle">The page you are looking for doesn't exist or has been moved.</text>
    <text x="0" y="12" font-size="14" font-weight="400" fill="#71717a" text-anchor="middle" dominant-baseline="middle">Check the URL or return to the home page.</text>

    <!-- "Go home" outline button -->
    <g id="btn-go-home" transform="translate(-64, 40)">
      <rect x="0" y="0" width="128" height="40" rx="6" fill="none" stroke="#e4e4e7" stroke-width="1.5"/>
      <text x="64" y="20" font-size="14" font-weight="500" fill="#18181b" text-anchor="middle" dominant-baseline="middle">Go home</text>
    </g>

  </g>
</svg>
