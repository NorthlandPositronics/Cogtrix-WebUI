<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <desc>
  Component: Session card model edit popover
  Page: Sessions (/sessions) — SessionCard tile; Settings > General (Default model field)
  Design system version: 3.14 (2026-03-25)
  Artboards: desktop 1280px
  Bug: BUG-06 — Edit session model via inline popover
  </desc>

  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="720" fill="#f4f4f5"/>

  <!-- ── Annotation banner ── -->
  <rect x="0" y="0" width="1280" height="32" fill="#fafafa" rx="0"/>
  <line x1="0" y1="32" x2="1280" y2="32" stroke="#e4e4e7" stroke-width="1"/>
  <text x="16" y="21" font-size="11" fill="#71717a" font-weight="500">BUG-06 — Session model edit popover — (1) Card chip hover  (2) Card chip + popover open  (3) List view row popover  (4) Settings Default model Select</text>

  <!-- ════════════════════════════════════════════
       PANEL 1 — SessionCard with chip HOVERED
       ════════════════════════════════════════════ -->

  <text x="24" y="60" font-size="11" font-weight="600" fill="#71717a">1 — Model chip: hover state (bg-zinc-100 bg, ChevronDown visible)</text>

  <!-- Card -->
  <rect x="24" y="70" width="220" height="148" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>

  <text x="40" y="100" font-size="14" font-weight="500" fill="#18181b">Research sprint</text>

  <!-- Agent state badge -->
  <rect x="40" y="110" width="30" height="16" rx="8" fill="#f4f4f5"/>
  <text x="45" y="122" font-size="10" fill="#52525b">idle</text>

  <!-- Model chip: HOVERED state — bg-zinc-100 text-zinc-900 rounded px-1 -mx-1 -->
  <!-- This is the button element: flex items-center gap-1 -->
  <rect x="36" y="134" width="130" height="22" rx="4" fill="#f4f4f5"/>
  <text x="40" y="149" font-size="13" fill="#18181b">claude-sonnet-4-6</text>
  <!-- ChevronDown h-3 w-3 -->
  <g transform="translate(160, 141)">
    <polyline points="0,2 5,8 10,2" fill="none" stroke="#71717a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Time -->
  <text x="40" y="180" font-size="11" fill="#71717a">2 hours ago</text>

  <!-- Trash icon ghost -->
  <g transform="translate(210, 68)" opacity="0.3">
    <rect width="26" height="26" rx="5" fill="transparent"/>
    <line x1="6" y1="6" x2="20" y2="6" stroke="#71717a" stroke-width="1.3" stroke-linecap="round"/>
    <rect x="4" y="7" width="16" height="12" rx="1.5" fill="none" stroke="#71717a" stroke-width="1.3"/>
  </g>

  <!-- Annotation: chip classes -->
  <rect x="24" y="226" width="220" height="46" rx="6" fill="#f0fdfa" stroke="#99f6e4" stroke-width="0.5"/>
  <text x="32" y="242" font-size="9" fill="#0f766e" font-family="monospace, monospace">hover:bg-zinc-100 rounded px-1 -mx-1</text>
  <text x="32" y="256" font-size="9" fill="#0f766e" font-family="monospace, monospace">text-zinc-900 — ChevronDown h-3 w-3</text>
  <text x="32" y="264" font-size="8" fill="#71717a">aria-label="Change model for session: Research sprint"</text>

  <!-- ════════════════════════════════════════════
       PANEL 2 — Card + Popover OPEN
       ════════════════════════════════════════════ -->

  <text x="280" y="60" font-size="11" font-weight="600" fill="#71717a">2 — Model chip: popover open (w-56, positioned below chip)</text>

  <!-- Card with open popover -->
  <rect x="280" y="70" width="220" height="148" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="296" y="100" font-size="14" font-weight="500" fill="#18181b">Research sprint</text>
  <rect x="296" y="110" width="30" height="16" rx="8" fill="#f4f4f5"/>
  <text x="301" y="122" font-size="10" fill="#52525b">idle</text>

  <!-- Model chip: open state (slightly active look) -->
  <rect x="292" y="134" width="130" height="22" rx="4" fill="#f4f4f5"/>
  <text x="296" y="149" font-size="13" fill="#18181b">claude-sonnet-4-6</text>
  <g transform="translate(416, 141)">
    <!-- ChevronDown (open = rotate implied) -->
    <polyline points="0,8 5,2 10,8" fill="none" stroke="#71717a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="296" y="180" font-size="11" fill="#71717a">2 hours ago</text>

  <!-- Popover: w-56 rounded-lg border border-zinc-200 bg-white shadow-md p-2 -->
  <!-- Positioned below the chip -->
  <rect x="280" y="220" width="224" height="170" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" filter="drop-shadow(0 4px 16px rgba(0,0,0,0.12))"/>

  <!-- Popover title: text-xs font-medium text-zinc-500 px-2 pb-1.5 -->
  <text x="290" y="238" font-size="11" font-weight="500" fill="#71717a">Change model</text>

  <!-- Select trigger -->
  <rect x="288" y="244" width="208" height="36" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="298" y="267" font-size="12" fill="#18181b">claude-sonnet-4-6</text>
  <!-- ChevronDown on Select -->
  <g transform="translate(478, 256)">
    <polyline points="0,2 4,6 8,2" fill="none" stroke="#71717a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Select content (dropdown items) -->
  <rect x="288" y="284" width="208" height="96" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.08))"/>

  <!-- Default option -->
  <rect x="288" y="284" width="208" height="28" rx="6" fill="#ffffff"/>
  <rect x="288" y="298" width="208" height="14" fill="#ffffff"/>
  <text x="300" y="302" font-size="12" fill="#52525b">System default</text>

  <!-- Option 1: ACTIVE/selected: CheckCircle2 -->
  <rect x="288" y="312" width="208" height="28" rx="4" fill="#f0fdfa"/>
  <text x="300" y="330" font-size="12" fill="#18181b">claude-sonnet-4-6</text>
  <!-- CheckCircle2 active -->
  <g transform="translate(472, 320)">
    <circle cx="8" cy="8" r="6.5" fill="none" stroke="#0d9488" stroke-width="1.3"/>
    <polyline points="4.5,8 7,10.5 11.5,5" fill="none" stroke="#0d9488" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Option 2 -->
  <rect x="288" y="340" width="208" height="28" rx="4" fill="#ffffff"/>
  <text x="300" y="358" font-size="12" fill="#52525b">ollama/qwen3:8b</text>

  <!-- Option 3 — hover -->
  <rect x="288" y="368" width="208" height="28" rx="4" fill="#fafafa"/>
  <!-- flatten top corners of hover row -->
  <text x="300" y="386" font-size="12" fill="#52525b">openai/gpt-4.1-mini</text>

  <!-- "Save on select" help text: text-xs text-zinc-500 mt-2 px-1 -->
  <text x="290" y="404" font-size="10" fill="#71717a">Save on select</text>

  <!-- ════════════════════════════════════════════
       PANEL 3 — List view row model cell popover
       ════════════════════════════════════════════ -->

  <text x="548" y="60" font-size="11" font-weight="600" fill="#71717a">3 — List view: model cell popover open</text>

  <!-- List table container -->
  <rect x="548" y="70" width="460" height="120" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Table header -->
  <rect x="548" y="70" width="460" height="36" rx="10" fill="#fafafa"/>
  <rect x="548" y="90" width="460" height="16" fill="#fafafa"/>
  <line x1="548" y1="106" x2="1008" y2="106" stroke="#e4e4e7" stroke-width="1"/>
  <text x="568" y="92" font-size="11" font-weight="500" fill="#71717a" letter-spacing="0.06em">NAME</text>
  <text x="694" y="92" font-size="11" font-weight="500" fill="#71717a" letter-spacing="0.06em">MODEL</text>
  <text x="842" y="92" font-size="11" font-weight="500" fill="#71717a" letter-spacing="0.06em">STATE</text>
  <text x="930" y="92" font-size="11" font-weight="500" fill="#71717a" letter-spacing="0.06em">UPDATED</text>

  <!-- Data row: hover bg-zinc-50 -->
  <rect x="548" y="106" width="460" height="52" fill="#fafafa"/>
  <text x="568" y="136" font-size="13" font-weight="500" fill="#18181b">Research sprint</text>

  <!-- Model cell: HOVERED button -->
  <rect x="690" y="120" width="140" height="22" rx="4" fill="#f4f4f5"/>
  <text x="696" y="135" font-size="12" fill="#18181b">claude-sonnet-4-6</text>
  <g transform="translate(820, 128)">
    <polyline points="0,2 4,6 8,2" fill="none" stroke="#71717a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <rect x="842" y="118" width="30" height="16" rx="8" fill="#f4f4f5"/>
  <text x="847" y="130" font-size="10" fill="#52525b">idle</text>
  <text x="930" y="136" font-size="11" fill="#71717a">2h ago</text>

  <!-- Popover below the model cell in list view -->
  <rect x="690" y="198" width="200" height="148" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" filter="drop-shadow(0 4px 16px rgba(0,0,0,0.12))"/>
  <!-- Arrow connector (simulated) -->
  <polygon points="750,190 756,198 762,190" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <rect x="751" y="194" width="12" height="6" fill="#ffffff"/>

  <text x="700" y="216" font-size="11" font-weight="500" fill="#71717a">Change model</text>
  <rect x="698" y="222" width="184" height="32" rx="5" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="706" y="242" font-size="12" fill="#18181b">claude-sonnet-4-6</text>
  <g transform="translate(864, 233)">
    <polyline points="0,2 4,6 8,2" fill="none" stroke="#71717a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Items -->
  <rect x="698" y="258" width="184" height="80" rx="5" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="708" y="276" font-size="12" fill="#52525b">System default</text>
  <line x1="699" y1="282" x2="881" y2="282" stroke="#f3f4f6" stroke-width="0.8"/>
  <rect x="698" y="282" width="184" height="26" rx="3" fill="#f0fdfa"/>
  <text x="708" y="299" font-size="12" fill="#18181b">claude-sonnet-4-6</text>
  <g transform="translate(860, 290)">
    <circle cx="8" cy="8" r="6" fill="none" stroke="#0d9488" stroke-width="1.3"/>
    <polyline points="4.5,8 7,10 11,5" fill="none" stroke="#0d9488" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="708" y="323" font-size="12" fill="#52525b">ollama/qwen3:8b</text>

  <!-- ════════════════════════════════════════════
       PANEL 4 — Settings General tab: Default model
       ════════════════════════════════════════════ -->

  <text x="548" y="420" font-size="11" font-weight="600" fill="#71717a">4 — Settings › General: Default model Select field (above divided list)</text>

  <!-- Settings section container -->
  <rect x="548" y="434" width="460" height="240" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Default model label + help text + Select -->
  <text x="566" y="462" font-size="13" font-weight="500" fill="#18181b">Default model</text>
  <text x="566" y="478" font-size="11" fill="#71717a">New sessions without a specified model will use this.</text>

  <!-- Select trigger: min-h-11 w-full sm:w-64 -->
  <rect x="566" y="486" width="256" height="44" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="578" y="513" font-size="13" fill="#18181b">claude-sonnet-4-6</text>
  <!-- ChevronDown -->
  <g transform="translate(800, 504)">
    <polyline points="0,2 5,8 10,2" fill="none" stroke="#71717a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- hr separator: border-zinc-200 mb-4 -->
  <line x1="566" y1="542" x2="992" y2="542" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Divided list continues below the separator (first 2 rows shown) -->
  <text x="566" y="558" font-size="11" fill="#71717a" font-style="italic">↓ feature flag divided list (existing ConfigFlagsForm rows)</text>

  <!-- Row 1 of divided list -->
  <rect x="566" y="566" width="424" height="1" fill="#e4e4e7"/>
  <div/>
  <text x="566" y="588" font-size="13" font-weight="500" fill="#18181b">Optimize prompts</text>
  <text x="566" y="604" font-size="11" fill="#71717a">Run prompts through the optimizer before sending.</text>
  <!-- Switch -->
  <rect x="952" y="580" width="34" height="18" rx="9" fill="#0d9488"/>
  <circle cx="976" cy="589" r="7" fill="#ffffff"/>

  <!-- Row 2 -->
  <line x1="566" y1="618" x2="990" y2="618" stroke="#e4e4e7" stroke-width="1"/>
  <text x="566" y="638" font-size="13" font-weight="500" fill="#18181b">Enable tool use</text>
  <text x="566" y="652" font-size="11" fill="#71717a">Allow the assistant to call external tools.</text>
  <rect x="952" y="630" width="34" height="18" rx="9" fill="#e4e4e7"/>
  <circle cx="963" cy="639" r="7" fill="#ffffff"/>

  <!-- DS Token callout for Panel 4 -->
  <rect x="838" y="434" width="170" height="96" rx="6" fill="#f0fdfa" stroke="#99f6e4" stroke-width="0.5"/>
  <text x="848" y="452" font-size="10" font-weight="600" fill="#0d9488">Default model DS tokens</text>
  <text x="848" y="468" font-size="9" fill="#71717a" font-family="monospace, monospace">Label: text-sm font-medium</text>
  <text x="848" y="482" font-size="9" fill="#71717a" font-family="monospace, monospace">  text-zinc-900</text>
  <text x="848" y="496" font-size="9" fill="#71717a" font-family="monospace, monospace">Help: text-xs text-zinc-500</text>
  <text x="848" y="510" font-size="9" fill="#71717a" font-family="monospace, monospace">Select: min-h-11 w-full</text>
  <text x="848" y="524" font-size="9" fill="#71717a" font-family="monospace, monospace">  sm:w-64</text>

  <!-- ── DS Tokens footer ── -->
  <rect x="8" y="670" width="1264" height="44" rx="8" fill="#18181b" opacity="0.85"/>
  <text x="24" y="688" font-size="11" font-weight="600" fill="#ffffff">DS Tokens — Model popover chip</text>
  <text x="24" y="704" font-size="10" fill="#a1a1aa">Rest: text-sm text-zinc-500 rounded px-1 -mx-1 — Hover: bg-zinc-100 text-zinc-900 — ChevronDown: h-3 w-3</text>
  <text x="460" y="704" font-size="10" fill="#a1a1aa">Popover: w-56 p-2 rounded-lg border border-zinc-200 bg-white shadow-md — Save on select (no Save button)</text>
  <text x="870" y="704" font-size="10" fill="#a1a1aa">Active option: CheckCircle2 h-4 w-4 text-teal-600 — e.stopPropagation() prevents card nav</text>
</svg>
