<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <desc>
  Component: Session remove dialog (3-option)
  Page: Sessions — triggered from SessionCard trash button
  Design system version: 3.14 (2026-03-25)
  Artboards: desktop 1280px (two dialog states: default + loading), mobile 390px
  Bug: BUG-03 — Session removal: 3-option dialog
  </desc>

  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="720" fill="#e4e4e7"/>

  <!-- ── Annotation banner ── -->
  <rect x="0" y="0" width="1280" height="32" fill="#18181b" opacity="0.85" rx="0"/>
  <text x="16" y="21" font-size="11" fill="#ffffff" font-weight="500">BUG-03 — 3-option session remove dialog — Left: Desktop default state. Center: Desktop archive-pending state. Right: Mobile (390px) layout.</text>

  <!-- ════════════════════════════════════════════
       DIALOG 1 — Desktop default state
       ════════════════════════════════════════════ -->

  <!-- Dimmed backdrop overlay (partial) -->
  <rect x="8" y="40" width="400" height="672" rx="8" fill="#18181b" opacity="0.5"/>

  <!-- Dialog panel: max-w-md, rounded-xl, bg-white, shadow-md -->
  <rect x="46" y="152" width="328" height="352" rx="12" fill="#ffffff" filter="drop-shadow(0 8px 24px rgba(0,0,0,0.18))"/>

  <!-- Close button: X top-right -->
  <g transform="translate(346, 164)">
    <rect width="24" height="24" rx="4" fill="transparent"/>
    <line x1="6" y1="6" x2="18" y2="18" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="6" x2="6" y2="18" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Dialog title: text-lg font-semibold -->
  <text x="68" y="186" font-size="16" font-weight="600" fill="#18181b">Remove session</text>

  <!-- Dialog description: text-sm text-zinc-600 -->
  <text x="68" y="208" font-size="12" fill="#52525b">Archiving keeps the session recoverable.</text>
  <text x="68" y="224" font-size="12" fill="#52525b">Permanent deletion removes all messages</text>
  <text x="68" y="240" font-size="12" fill="#52525b">and cannot be undone.</text>

  <!-- Divider -->
  <line x1="68" y1="258" x2="358" y2="258" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Option blocks -->
  <!-- Archive option block -->
  <g transform="translate(68, 268)">
    <!-- Archive icon h-10 w-10 text-zinc-400 -->
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#f4f4f5"/>
    <!-- Archive icon outline -->
    <rect x="8" y="14" width="24" height="16" rx="2" fill="none" stroke="#a1a1aa" stroke-width="1.5"/>
    <line x1="4" y1="14" x2="36" y2="14" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="20" x2="26" y2="20" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Archive text block -->
    <text x="50" y="16" font-size="13" font-weight="500" fill="#18181b">Archive</text>
    <text x="50" y="32" font-size="12" fill="#52525b">Hidden but kept. Restore later.</text>
  </g>

  <!-- Delete option block -->
  <g transform="translate(68, 326)">
    <!-- Trash2 icon h-10 w-10 text-zinc-400 -->
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#fef2f2"/>
    <!-- Trash2 icon -->
    <line x1="10" y1="12" x2="30" y2="12" stroke="#fca5a5" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="9" x2="20" y2="12" stroke="#fca5a5" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="8" y="13" width="24" height="16" rx="2" fill="none" stroke="#fca5a5" stroke-width="1.5"/>
    <line x1="15" y1="17" x2="15" y2="25" stroke="#fca5a5" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="20" y1="17" x2="20" y2="25" stroke="#fca5a5" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="25" y1="17" x2="25" y2="25" stroke="#fca5a5" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Delete text block -->
    <text x="50" y="16" font-size="13" font-weight="500" fill="#18181b">Delete permanently</text>
    <text x="50" y="32" font-size="12" fill="#52525b">All data erased. Cannot be undone.</text>
  </g>

  <!-- Divider above footer -->
  <line x1="68" y1="388" x2="358" y2="388" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Footer: sm:flex-row justify-between — Cancel LEFT, Archive+Delete RIGHT -->
  <!-- Cancel button: variant="outline" min-h-11 -->
  <rect x="68" y="400" width="80" height="44" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="93" y="427" font-size="13" font-weight="500" fill="#18181b">Cancel</text>

  <!-- Archive button: variant="outline" min-h-11 gap-2 + Archive icon -->
  <rect x="212" y="400" width="68" height="44" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <!-- Archive icon h-4 w-4 inside button -->
  <g transform="translate(218, 412)">
    <rect x="0" y="4" width="14" height="10" rx="1.5" fill="none" stroke="#18181b" stroke-width="1.3"/>
    <line x1="-2" y1="4" x2="16" y2="4" stroke="#18181b" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="4" y1="7" x2="10" y2="7" stroke="#18181b" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <text x="236" y="427" font-size="13" font-weight="500" fill="#18181b">Archive</text>

  <!-- Delete permanently button: variant="destructive" bg-red-600 text-white min-h-11 -->
  <rect x="286" y="400" width="84" height="44" rx="6" fill="#dc2626"/>
  <!-- Trash2 icon h-4 w-4 white -->
  <g transform="translate(292, 412)">
    <line x1="2" y1="4" x2="14" y2="4" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="8" y1="2" x2="8" y2="4" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round"/>
    <rect x="0" y="5" width="16" height="11" rx="1.5" fill="none" stroke="#ffffff" stroke-width="1.3"/>
    <line x1="5" y1="8" x2="5" y2="13" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="8" y1="8" x2="8" y2="13" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="11" y1="8" x2="11" y2="13" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round"/>
  </g>
  <text x="312" y="427" font-size="11" font-weight="500" fill="#ffffff">Delete</text>
  <text x="303" y="438" font-size="9" fill="#fecaca">permanently</text>

  <!-- Frame label -->
  <text x="46" y="516" font-size="11" font-weight="600" fill="#ffffff">Default state — sm+ layout</text>
  <text x="46" y="531" font-size="10" fill="#d4d4d8">Cancel (left) / Archive + Delete (right)</text>

  <!-- ════════════════════════════════════════════
       DIALOG 2 — Desktop archive-pending state
       ════════════════════════════════════════════ -->

  <rect x="432" y="40" width="400" height="672" rx="8" fill="#18181b" opacity="0.5"/>
  <rect x="470" y="152" width="328" height="352" rx="12" fill="#ffffff" filter="drop-shadow(0 8px 24px rgba(0,0,0,0.18))"/>

  <!-- Close button -->
  <g transform="translate(770, 164)">
    <line x1="6" y1="6" x2="18" y2="18" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="6" x2="6" y2="18" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <text x="492" y="186" font-size="16" font-weight="600" fill="#18181b">Remove session</text>
  <text x="492" y="208" font-size="12" fill="#52525b">Archiving keeps the session recoverable.</text>
  <text x="492" y="224" font-size="12" fill="#52525b">Permanent deletion removes all messages</text>
  <text x="492" y="240" font-size="12" fill="#52525b">and cannot be undone.</text>
  <line x1="492" y1="258" x2="782" y2="258" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Same option blocks -->
  <g transform="translate(492, 268)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#f4f4f5"/>
    <rect x="8" y="14" width="24" height="16" rx="2" fill="none" stroke="#a1a1aa" stroke-width="1.5"/>
    <line x1="4" y1="14" x2="36" y2="14" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="20" x2="26" y2="20" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/>
    <text x="50" y="16" font-size="13" font-weight="500" fill="#18181b">Archive</text>
    <text x="50" y="32" font-size="12" fill="#52525b">Hidden but kept. Restore later.</text>
  </g>
  <g transform="translate(492, 326)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#fef2f2"/>
    <line x1="10" y1="12" x2="30" y2="12" stroke="#fca5a5" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="8" y="13" width="24" height="16" rx="2" fill="none" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="50" y="16" font-size="13" font-weight="500" fill="#18181b">Delete permanently</text>
    <text x="50" y="32" font-size="12" fill="#52525b">All data erased. Cannot be undone.</text>
  </g>

  <line x1="492" y1="388" x2="782" y2="388" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Cancel: still enabled -->
  <rect x="492" y="400" width="80" height="44" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="517" y="427" font-size="13" font-weight="500" fill="#18181b">Cancel</text>

  <!-- Archive button: PENDING (spinner + disabled) -->
  <rect x="636" y="400" width="80" height="44" rx="6" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1" opacity="0.8"/>
  <!-- Loader2 spinner icon -->
  <circle cx="654" cy="422" r="6" fill="none" stroke="#71717a" stroke-width="1.5" stroke-dasharray="14 6"/>
  <text x="664" y="427" font-size="13" font-weight="500" fill="#71717a">Archive</text>

  <!-- Delete permanently: DISABLED -->
  <rect x="722" y="400" width="88" height="44" rx="6" fill="#fca5a5" opacity="0.5"/>
  <text x="736" y="420" font-size="11" font-weight="500" fill="#ffffff" opacity="0.6">Delete</text>
  <text x="727" y="434" font-size="9" fill="#ffffff" opacity="0.5">permanently</text>

  <!-- Loading annotation pill -->
  <rect x="636" y="452" width="174" height="20" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="644" y="466" font-size="10" fill="#c2410c">Archive pending — Delete disabled</text>

  <!-- Frame label -->
  <text x="470" y="516" font-size="11" font-weight="600" fill="#ffffff">Archive mutation pending</text>
  <text x="470" y="531" font-size="10" fill="#d4d4d8">Spinner on Archive btn • Delete disabled • Cancel enabled</text>

  <!-- ════════════════════════════════════════════
       DIALOG 3 — Mobile (390px) layout
       ════════════════════════════════════════════ -->

  <!-- Mobile frame bg -->
  <rect x="864" y="40" width="408" height="672" rx="8" fill="#18181b" opacity="0.5"/>

  <!-- Mobile dialog: same max-w-md but footer is flex-col-reverse -->
  <rect x="888" y="120" width="360" height="420" rx="12" fill="#ffffff" filter="drop-shadow(0 8px 24px rgba(0,0,0,0.18))"/>

  <!-- Close button -->
  <g transform="translate(1220, 132)">
    <line x1="6" y1="6" x2="18" y2="18" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="6" x2="6" y2="18" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <text x="908" y="154" font-size="16" font-weight="600" fill="#18181b">Remove session</text>
  <text x="908" y="174" font-size="12" fill="#52525b">Archiving keeps the session recoverable.</text>
  <text x="908" y="190" font-size="12" fill="#52525b">Permanent deletion cannot be undone.</text>

  <line x1="908" y1="208" x2="1232" y2="208" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Options (compact) -->
  <g transform="translate(908, 218)">
    <rect x="0" y="0" width="36" height="36" rx="7" fill="#f4f4f5"/>
    <rect x="6" y="12" width="22" height="14" rx="2" fill="none" stroke="#a1a1aa" stroke-width="1.4"/>
    <line x1="2" y1="12" x2="34" y2="12" stroke="#a1a1aa" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="10" y1="17" x2="22" y2="17" stroke="#a1a1aa" stroke-width="1.3" stroke-linecap="round"/>
    <text x="46" y="16" font-size="13" font-weight="500" fill="#18181b">Archive</text>
    <text x="46" y="30" font-size="12" fill="#52525b">Hidden but kept. Restore later.</text>
  </g>

  <g transform="translate(908, 268)">
    <rect x="0" y="0" width="36" height="36" rx="7" fill="#fef2f2"/>
    <line x1="6" y1="10" x2="30" y2="10" stroke="#fca5a5" stroke-width="1.4" stroke-linecap="round"/>
    <rect x="4" y="11" width="22" height="14" rx="2" fill="none" stroke="#fca5a5" stroke-width="1.4"/>
    <text x="46" y="16" font-size="13" font-weight="500" fill="#18181b">Delete permanently</text>
    <text x="46" y="30" font-size="12" fill="#52525b">All data erased. Cannot be undone.</text>
  </g>

  <line x1="908" y1="320" x2="1232" y2="320" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Mobile footer: flex-col-reverse — Delete permanently TOP, Archive MIDDLE, Cancel BOTTOM -->
  <!-- "Delete permanently" at top (topmost = farthest from natural thumb) -->
  <rect x="908" y="330" width="320" height="44" rx="6" fill="#dc2626"/>
  <g transform="translate(912, 342)">
    <line x1="2" y1="4" x2="14" y2="4" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round"/>
    <rect x="0" y="5" width="16" height="11" rx="1.5" fill="none" stroke="#ffffff" stroke-width="1.3"/>
  </g>
  <text x="942" y="357" font-size="13" font-weight="500" fill="#ffffff">Delete permanently</text>

  <!-- Archive in middle -->
  <rect x="908" y="382" width="320" height="44" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <g transform="translate(912, 394)">
    <rect x="0" y="4" width="14" height="10" rx="1.5" fill="none" stroke="#18181b" stroke-width="1.3"/>
    <line x1="-2" y1="4" x2="16" y2="4" stroke="#18181b" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="4" y1="7" x2="10" y2="7" stroke="#18181b" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <text x="942" y="409" font-size="13" font-weight="500" fill="#18181b">Archive</text>

  <!-- Cancel at BOTTOM (easiest to reach, thumb zone) -->
  <rect x="908" y="434" width="320" height="44" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="1048" y="461" font-size="13" font-weight="500" fill="#18181b" text-anchor="middle">Cancel</text>

  <!-- Thumb zone annotation -->
  <rect x="1240" y="434" width="4" height="44" rx="2" fill="#0d9488" opacity="0.3"/>
  <text x="1250" y="452" font-size="9" fill="#0d9488">thumb</text>
  <text x="1250" y="464" font-size="9" fill="#0d9488">zone</text>

  <!-- Mobile col-reverse annotation arrows -->
  <text x="888" y="480" font-size="10" fill="#52525b" font-style="italic">flex-col-reverse: Delete top → Archive → Cancel bottom (safest exit)</text>

  <!-- Frame label -->
  <text x="888" y="564" font-size="11" font-weight="600" fill="#ffffff">Mobile (390px) — flex-col-reverse footer</text>
  <text x="888" y="579" font-size="10" fill="#d4d4d8">Most dangerous action farthest from thumb rest</text>

  <!-- ── DS Token summary ── -->
  <rect x="8" y="644" width="1264" height="68" rx="8" fill="#18181b" opacity="0.85"/>
  <text x="28" y="664" font-size="11" font-weight="600" fill="#ffffff">DS Tokens</text>
  <text x="28" y="680" font-size="11" fill="#a1a1aa">Cancel: variant="outline" min-h-11</text>
  <text x="28" y="696" font-size="10" fill="#71717a">Outline, no icon</text>
  <text x="240" y="680" font-size="11" fill="#a1a1aa">Archive: variant="outline" min-h-11 gap-2</text>
  <text x="240" y="696" font-size="10" fill="#71717a">Archive icon h-4 w-4</text>
  <text x="500" y="680" font-size="11" fill="#a1a1aa">Delete: variant="destructive" min-h-11 gap-2 bg-red-600 text-white</text>
  <text x="500" y="696" font-size="10" fill="#71717a">Trash2 icon h-4 w-4</text>
  <text x="820" y="680" font-size="11" fill="#a1a1aa">Dialog: max-w-md rounded-xl</text>
  <text x="820" y="696" font-size="10" fill="#71717a">Custom Dialog (not ConfirmDialog)</text>
  <text x="1020" y="680" font-size="11" fill="#a1a1aa">Footer sm+: flex-row justify-between</text>
  <text x="1020" y="696" font-size="10" fill="#71717a">Mobile: flex-col-reverse gap-2</text>
</svg>
