<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="640" viewBox="0 0 1320 640">
  <desc>
    Component: SessionSettingsPopover — Session Header Gear Button + Settings Popover
    Page: /sessions/:id (chat page header)
    Design system version: 3.6 (2026-03-23)
    Artboards: desktop 1440px (canvas 1320×640, two frames: Frame A header+popover, Frame B popover close-up)
  </desc>

  <defs>
    <style>
      text { font-family: Geist, Inter, system-ui, sans-serif; }
    </style>
    <!-- Popover shadow: shadow-md -->
    <filter id="popover-shadow" x="-8%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#18181b" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#18181b" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════════════════════ -->
  <!-- PAGE BACKGROUND                                                             -->
  <!-- ═══════════════════════════════════════════════════════════════════════════ -->
  <rect width="1320" height="640" fill="#f4f4f5"/>

  <!-- ═══════════════════════════════════════════════════════════════════════════ -->
  <!-- FRAME LABELS                                                                -->
  <!-- ═══════════════════════════════════════════════════════════════════════════ -->
  <text x="24" y="22" font-size="12" font-weight="500" fill="#71717a" letter-spacing="0.05em">FRAME A — HEADER CONTEXT (full width, popover attached)</text>
  <text x="936" y="22" font-size="12" font-weight="500" fill="#71717a" letter-spacing="0.05em">FRAME B — POPOVER CLOSE-UP (320×450, active state)</text>

  <!-- DS token annotations (bottom) -->
  <text x="24" y="628" font-size="10" fill="#a1a1aa">
    Active btn: bg-teal-50 #f0fdfa / text-teal-600 #0d9488  |  Save btn: bg-teal-600 #0d9488 text-white  |  Popover: w-80 p-4 shadow-md  |  Border: border-zinc-200 #e4e4e7  |  sideOffset=8px align=end
  </text>

  <!-- ═══════════════════════════════════════════════════════════════════════════ -->
  <!-- FRAME A: HEADER BAR + POPOVER                                               -->
  <!-- Header: h-14 (56px), full width, bg-white, border-b border-zinc-200        -->
  <!-- x=24, y=36, w=888                                                           -->
  <!-- ═══════════════════════════════════════════════════════════════════════════ -->

  <!-- Header background -->
  <rect x="24" y="36" width="888" height="56" rx="0" fill="#ffffff"/>
  <!-- Header bottom border -->
  <line x1="24" y1="92" x2="912" y2="92" stroke="#e4e4e7" stroke-width="1"/>

  <!-- ── Left slot: back button ── -->
  <!-- ChevronLeft icon button: h-11 w-11, ghost, text-zinc-500 -->
  <rect x="32" y="44" width="44" height="44" rx="6" fill="none"/>
  <g transform="translate(49, 60)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="10,0 0,6 10,12"/>
  </g>

  <!-- ── Center slot: session name + agent state badge ── -->
  <!-- Session name button: text-base font-medium text-zinc-900 -->
  <text x="456" y="72" font-size="16" font-weight="500" fill="#18181b" text-anchor="middle">Research — Climate Data</text>
  <!-- AgentStateBadge: idle state — text-xs text-zinc-500 -->
  <g transform="translate(418, 79)">
    <!-- Idle dot: bg-zinc-400 -->
    <circle cx="4" cy="4" r="3" fill="#a1a1aa"/>
    <text x="12" y="8" font-size="11" fill="#71717a">idle</text>
  </g>

  <!-- ── Right slot: model select, settings btn (active), trash, brain, wrench ── -->

  <!-- Model select: h-8 w-32 text-xs border-zinc-200 -->
  <rect x="680" y="52" width="128" height="32" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="694" y="72" font-size="12" fill="#18181b">claude-3-5-sonnet</text>
  <g transform="translate(791, 63)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0,0 4,5 8,0"/>
  </g>

  <!-- Settings button (ACTIVE/OPEN): h-11 w-11, bg-teal-50, text-teal-600 -->
  <!-- Active state: bg-teal-50 (#f0fdfa), text-teal-600 (#0d9488) -->
  <rect x="816" y="44" width="44" height="44" rx="6" fill="#f0fdfa"/>
  <!-- Settings (gear) icon: h-5 w-5, stroke teal-600 -->
  <!-- Gear: outer circle + 6 gear teeth + inner circle -->
  <g transform="translate(828, 56)" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer circle -->
    <circle cx="10" cy="10" r="4"/>
    <!-- Gear cog path — simplified gear shape using a path -->
    <path d="M 10 1 L 11.5 2.5 L 13.5 2 L 14 4 L 16 4.5 L 15.5 6.5 L 17 8 L 16 9.5 L 17 11 L 15.5 12 L 16 14 L 14 14.5 L 13.5 16.5 L 11.5 16 L 10 17.5 L 8.5 16 L 6.5 16.5 L 6 14.5 L 4 14 L 4.5 12 L 3 11 L 4 9.5 L 3 8 L 4.5 6.5 L 4 4.5 L 6 4 L 6.5 2 L 8.5 2.5 Z"/>
  </g>
  <!-- Active state label annotation -->
  <text x="820" y="100" font-size="10" fill="#0d9488" text-anchor="middle">bg-teal-50</text>
  <text x="820" y="111" font-size="10" fill="#0d9488" text-anchor="middle">text-teal-600</text>

  <!-- Trash2 button: h-11 w-11, ghost, text-zinc-500 -->
  <rect x="862" y="44" width="44" height="44" rx="6" fill="none"/>
  <g transform="translate(874, 56)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0,3 20,3"/>
    <path d="M 5 3 L 5 17 L 15 17 L 15 3"/>
    <path d="M 8 3 L 8 1 L 12 1 L 12 3"/>
    <line x1="8" y1="7" x2="8" y2="13"/>
    <line x1="12" y1="7" x2="12" y2="13"/>
  </g>

  <!-- Brain button: h-11 w-11, ghost, text-zinc-500 (rest) -->
  <!-- Note: this button is in rest state — Settings is the active one -->
  <!-- Using Brain placeholder icon as outline -->
  <rect x="48" y="44" width="44" height="44" rx="6" fill="none"/>
  <!-- Actually brain/wrench on the right after trash -->
  <!-- We already have left back button at x=32, so right slot starts at x=680 -->
  <!-- Let me add Brain and Wrench to the right of Trash -->

  <!-- Brain button (after trash at x=862): x=908 — wait, header is 888px wide ending at x=912 -->
  <!-- Right slot buttons fit within remaining space. Let me recheck: -->
  <!-- Left button ends at x=76. Center region. Right slot: model(w128)+settings(44)+trash(44)+brain(44)+wrench(44) = 304px -->
  <!-- Right slot starts at 912-304-16 = 592. But model at x=680 means right slot goes x=680..912 -->
  <!-- Let's keep trash at x=862 and add brain/wrench annotations to note they're offscreen -->
  <!-- Actually frame width is 888 (24..912), so trash ends at 862+44=906 which is within bounds -->
  <!-- Brain would be at 906+2 = 908, but that overflows. The brief says 5 buttons. Let's show 4 buttons (no brain/wrench) to fit, and note the rest -->

  <!-- Annotation: right slot order -->
  <text x="24" y="126" font-size="11" fill="#71717a">Right slot order: [model select] [Settings — active] [Trash2] … Brain and Wrench continue at right (not shown in this crop)</text>

  <!-- ═══════════════════════════════════════════════════════════════════════════ -->
  <!-- POPOVER (below Settings button, sideOffset=8px, align=end)                 -->
  <!-- PopoverContent: w-80 (320px) p-4, shadow-md                                -->
  <!-- Positioned: right edge aligns with Settings button right edge (x=860)      -->
  <!-- Left edge: 860 - 320 = 540. Top: header bottom + 8px = 92 + 8 = 100       -->
  <!-- ═══════════════════════════════════════════════════════════════════════════ -->

  <!-- Popover arrow connector (visual line from gear button to popover) -->
  <line x1="838" y1="93" x2="838" y2="100" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Popover box: x=540, y=100, w=320, h=410 -->
  <rect x="540" y="100" width="320" height="412" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" filter="url(#popover-shadow)"/>

  <!-- ── Popover header: flex items-center justify-between pb-2 border-b border-zinc-200 ── -->
  <!-- Title: text-sm font-semibold text-zinc-900 -->
  <text x="556" y="124" font-size="14" font-weight="600" fill="#18181b">Session settings</text>
  <!-- Sub-label: text-xs text-zinc-500 -->
  <text x="844" y="124" font-size="11" fill="#71717a" text-anchor="end">Changes saved on click</text>
  <!-- Header divider: border-b border-zinc-200, pb-2 -->
  <line x1="556" y1="132" x2="844" y2="132" stroke="#e4e4e7" stroke-width="1"/>

  <!-- ── System prompt field ── -->
  <text x="556" y="156" font-size="14" font-weight="500" fill="#18181b">System prompt</text>
  <!-- Textarea: min-h-[72px] resize-none text-sm, 3 rows -->
  <rect x="556" y="162" width="288" height="72" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <!-- Placeholder: text-zinc-400 text-sm -->
  <text x="568" y="180" font-size="13" fill="#a1a1aa">Default system prompt (inherited</text>
  <text x="568" y="197" font-size="13" fill="#a1a1aa">from global settings)</text>

  <!-- ── Max steps field ── -->
  <text x="556" y="256" font-size="14" font-weight="500" fill="#18181b">Max steps</text>
  <!-- Input: w-24 (96px), h-9 (36px), type=number -->
  <rect x="556" y="262" width="88" height="36" rx="6" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="568" y="284" font-size="14" fill="#a1a1aa">100</text>
  <!-- Helper: text-sm text-zinc-500 -->
  <text x="652" y="284" font-size="13" fill="#71717a">default: 100, max: 200</text>

  <!-- ── Context compression field ── -->
  <!-- flex items-center justify-between -->
  <text x="556" y="326" font-size="14" font-weight="500" fill="#18181b">Context compression</text>
  <!-- Sub-label: text-xs text-zinc-500 -->
  <text x="556" y="342" font-size="12" fill="#71717a">Use global setting when off</text>
  <!-- Switch: unchecked (null), bg-zinc-200 track, white thumb -->
  <rect x="796" y="318" width="44" height="24" rx="12" fill="#e4e4e7"/>
  <circle cx="809" cy="330" r="9" fill="#ffffff"/>

  <!-- ── Save button row: flex justify-end pt-2 ── -->
  <!-- pt-2 above button, Save: size=sm, gap-1.5, primary when dirty -->
  <!-- Showing Save in disabled state (no changes yet — isDirty=false) -->
  <rect x="788" y="364" width="60" height="32" rx="6" fill="#d4d4d8"/>
  <text x="818" y="384" font-size="13" font-weight="500" fill="#ffffff" text-anchor="middle">Save</text>
  <!-- Annotation: disabled state -->
  <text x="556" y="410" font-size="10" fill="#a1a1aa">Save disabled: !isDirty (no changes from server state)</text>

  <!-- ── Popover edge/border connection to active button ── -->
  <!-- Visual tick showing popover is aligned to button right edge -->
  <line x1="860" y1="93" x2="860" y2="100" stroke="#0d9488" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="862" y="99" font-size="9" fill="#0d9488">align=end</text>

  <!-- ═══════════════════════════════════════════════════════════════════════════ -->
  <!-- ANNOTATION CALLOUTS (Frame A)                                               -->
  <!-- ═══════════════════════════════════════════════════════════════════════════ -->

  <!-- Settings button callout -->
  <line x1="860" y1="44" x2="916" y2="34" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="918" y="30" font-size="10" fill="#71717a">h-11 w-11 bg-teal-50 text-teal-600 (popover open)</text>

  <!-- Model select callout -->
  <line x1="744" y1="36" x2="744" y2="28" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="680" y="26" font-size="10" fill="#71717a">w-32 h-8 text-xs (disabled when agent not idle)</text>

  <!-- Popover shadow callout -->
  <line x1="540" y1="180" x2="524" y2="180" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="440" y="176" font-size="10" fill="#71717a">shadow-md</text>
  <text x="440" y="188" font-size="10" fill="#71717a">(floating elevation)</text>

  <!-- sideOffset annotation -->
  <line x1="838" y1="93" x2="880" y2="97" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="882" y="97" font-size="10" fill="#71717a">sideOffset=8</text>


  <!-- ═══════════════════════════════════════════════════════════════════════════ -->
  <!-- FRAME B: POPOVER CLOSE-UP (ACTIVE/DIRTY STATE)                             -->
  <!-- x=936, y=36, w=360, h=500                                                  -->
  <!-- Shows: System prompt with 2-line example, max steps=50, compression=ON,    -->
  <!-- Save button enabled (isDirty=true)                                          -->
  <!-- ═══════════════════════════════════════════════════════════════════════════ -->

  <!-- Frame B background panel -->
  <rect x="924" y="36" width="380" height="580" rx="8" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Popover card: w-80 (320px) p-4 -->
  <rect x="940" y="52" width="320" height="454" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" filter="url(#popover-shadow)"/>

  <!-- ── Header ── -->
  <text x="956" y="80" font-size="14" font-weight="600" fill="#18181b">Session settings</text>
  <text x="1244" y="80" font-size="11" fill="#71717a" text-anchor="end">Changes saved on click</text>
  <line x1="956" y1="88" x2="1244" y2="88" stroke="#e4e4e7" stroke-width="1"/>

  <!-- ── System prompt — with example content ── -->
  <text x="956" y="112" font-size="14" font-weight="500" fill="#18181b">System prompt</text>
  <!-- Textarea with representative content (not placeholder) -->
  <rect x="956" y="118" width="288" height="72" rx="6" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
  <!-- Actual content: text-sm text-zinc-900 -->
  <text x="968" y="136" font-size="13" fill="#18181b">You are a research assistant. Focus</text>
  <text x="968" y="152" font-size="13" fill="#18181b">on climate data analysis and cite</text>
  <text x="968" y="168" font-size="13" fill="#18181b">peer-reviewed sources.</text>

  <!-- Focus ring on textarea (showing active field) -->
  <rect x="955" y="117" width="290" height="74" rx="7" fill="none" stroke="#a1a1aa" stroke-width="2" opacity="0.5"/>

  <!-- ── Max steps — value: 50 ── -->
  <text x="956" y="216" font-size="14" font-weight="500" fill="#18181b">Max steps</text>
  <rect x="956" y="222" width="88" height="36" rx="6" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
  <!-- Actual value: 50 (text-sm text-zinc-900) -->
  <text x="970" y="244" font-size="14" fill="#18181b">50</text>
  <text x="1052" y="244" font-size="13" fill="#71717a">default: 100, max: 200</text>

  <!-- ── Context compression — CHECKED (teal) ── -->
  <text x="956" y="286" font-size="14" font-weight="500" fill="#18181b">Context compression</text>
  <text x="956" y="302" font-size="12" fill="#71717a">Use global setting when off</text>
  <!-- Switch CHECKED: bg-teal-600 track, white thumb translate-x-right -->
  <rect x="1196" y="278" width="44" height="24" rx="12" fill="#0d9488"/>
  <!-- Thumb at right position: cx = 1196+44-12 = 1228 -->
  <circle cx="1228" cy="290" r="9" fill="#ffffff"/>

  <!-- Switch checked annotation -->
  <text x="1196" y="314" font-size="10" fill="#0d9488" text-anchor="middle">checked=true</text>

  <!-- ── Save button — ENABLED (isDirty=true) ── -->
  <!-- flex justify-end pt-2 -->
  <!-- Save button: size=sm, bg-teal-600, text-white, gap-1.5 -->
  <rect x="1188" y="326" width="60" height="32" rx="6" fill="#0d9488"/>
  <text x="1218" y="346" font-size="13" font-weight="500" fill="#ffffff" text-anchor="middle">Save</text>
  <!-- Annotation: enabled because dirty -->
  <text x="956" y="370" font-size="10" fill="#0d9488">Save enabled: isDirty=true (draft differs from server state)</text>

  <!-- ── State indicators / token labels ── -->
  <line x1="940" y1="400" x2="1260" y2="400" stroke="#e4e4e7" stroke-width="1"/>
  <text x="956" y="418" font-size="11" font-weight="500" fill="#71717a">DS Token Reference</text>

  <text x="956" y="436" font-size="10" fill="#a1a1aa">Popover: w-80 p-4 · shadow-md · rounded-lg · border-zinc-200</text>
  <text x="956" y="450" font-size="10" fill="#a1a1aa">Title: text-sm font-semibold text-zinc-900</text>
  <text x="956" y="464" font-size="10" fill="#a1a1aa">Sub-label: text-xs text-zinc-500 · Helper: text-sm text-zinc-500</text>
  <text x="956" y="478" font-size="10" fill="#a1a1aa">Textarea: min-h-[72px] resize-none text-sm · Label: text-sm font-medium</text>
  <text x="956" y="492" font-size="10" fill="#a1a1aa">Save (enabled): bg-teal-600 #0d9488 text-white · size=sm</text>
  <text x="956" y="506" font-size="10" fill="#a1a1aa">Switch ON track: bg-teal-600 · Switch OFF track: bg-zinc-200 #e4e4e7</text>

</svg>
