<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" width="1280" height="860">
  <desc>
  Component: Sessions page — bulk selection with action bar
  Page: Sessions (/sessions)
  Design system version: 3.14 (2026-03-25)
  Artboards: desktop 1280px (grid view + list view), mobile 390px
  Bug: BUG-05 — Bulk session selection and group operations
  </desc>

  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Page background -->
