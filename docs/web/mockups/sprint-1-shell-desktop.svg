<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif">
  <desc>
  SUPERSEDED — Violet-600 accent colors. DS §16 FLAG-005. Do not use as a build target. See DS §16 FLAG-005.
  Component: App Shell — Desktop (AppShell + Sidebar)
  Page: /sessions (Sessions route active), user=alice role=user
  Design system version: 1.0 (2026-03-05)
  Artboards: desktop 1440×900px
  </desc>

  <!-- ===================== OUTER SHELL: flex h-screen overflow-hidden ===================== -->
  <rect width="1440" height="900" fill="#ffffff"/>

  <!-- ===================== SIDEBAR ===================== -->
  <!-- w-[220px] flex-col bg-zinc-50 border-r border-zinc-200 full height -->
  <g id="layer-sidebar">
    <rect x="0" y="0" width="220" height="900" fill="#fafafa"/>
    <line x1="220" y1="0" x2="220" y2="900" stroke="#e4e4e7" stroke-width="1"/>

    <!-- WORDMARK: px-4 py-4, text-lg font-semibold text-zinc-900 -->
    <g id="zone-wordmark">
      <text x="16" y="36" font-size="18" font-weight="600" fill="#18181b">Cogtrix</text>
    </g>

    <!-- SEPARATOR after wordmark: y=52 -->
    <line x1="0" y1="56" x2="220" y2="56" stroke="#e4e4e7" stroke-width="1"/>

    <!-- NAV SECTION: px-2 space-y-1 starts at y=64 -->
    <g id="zone-nav">

      <!-- Sessions — ACTIVE: bg-violet-50, text-violet-600, border-l-2 border-violet-600 -->
      <!-- Item height: py-2 (8px top+bottom) + 14px text = ~36px -->
      <g id="nav-sessions-active">
        <rect x="8" y="64" width="204" height="36" rx="6" fill="#f5f3ff"/>
        <!-- Left border indicator: 2px violet-600 -->
        <rect x="8" y="64" width="2" height="36" rx="1" fill="#7c3aed"/>
        <!-- Icon: MessageSquare (24px → 16px w-4 h-4), text-violet-600 -->
        <!-- MessageSquare: chat bubble rectangle with tail -->
        <g transform="translate(18, 72)" fill="none" stroke="#7c3aed" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="0" y="0" width="16" height="13" rx="2"/>
          <polyline points="0,13 0,16 4,13"/>
          <line x1="4" y1="4" x2="12" y2="4"/>
          <line x1="4" y1="7" x2="10" y2="7"/>
        </g>
        <!-- Label: text-sm font-medium text-violet-600 — pl-[10px] compensates for 2px border -->
        <text x="42" y="87" font-size="14" font-weight="500" fill="#7c3aed">Sessions</text>
      </g>

      <!-- Documents — INACTIVE: text-zinc-600, no bg -->
      <g id="nav-documents">
        <rect x="8" y="108" width="204" height="36" rx="6" fill="none"/>
        <!-- FileText icon -->
        <g transform="translate(18, 116)" fill="none" stroke="#a1a1aa" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 0 L10 0 L14 4 L14 16 L2 16 Z"/>
          <polyline points="10,0 10,4 14,4"/>
          <line x1="5" y1="8" x2="11" y2="8"/>
          <line x1="5" y1="11" x2="11" y2="11"/>
        </g>
        <text x="42" y="131" font-size="14" font-weight="500" fill="#52525b">Documents</text>
      </g>

      <!-- Assistant — INACTIVE -->
      <g id="nav-assistant">
        <rect x="8" y="152" width="204" height="36" rx="6" fill="none"/>
        <!-- Bot icon -->
        <g transform="translate(18, 160)" fill="none" stroke="#a1a1aa" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="12" height="10" rx="2"/>
          <circle cx="6" cy="9" r="1.5"/>
          <circle cx="10" cy="9" r="1.5"/>
          <line x1="8" y1="0" x2="8" y2="4"/>
          <line x1="0" y1="9" x2="2" y2="9"/>
          <line x1="14" y1="9" x2="16" y2="9"/>
        </g>
        <text x="42" y="175" font-size="14" font-weight="500" fill="#52525b">Assistant</text>
      </g>

      <!-- Settings — INACTIVE -->
      <g id="nav-settings">
        <rect x="8" y="196" width="204" height="36" rx="6" fill="none"/>
        <!-- Settings (gear) icon approximation -->
        <g transform="translate(18, 204)" fill="none" stroke="#a1a1aa" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="3"/>
          <path d="M8 0 L8 2 M8 14 L8 16 M0 8 L2 8 M14 8 L16 8 M2.3 2.3 L3.8 3.8 M12.2 12.2 L13.7 13.7 M13.7 2.3 L12.2 3.8 M3.8 12.2 L2.3 13.7"/>
        </g>
        <text x="42" y="219" font-size="14" font-weight="500" fill="#52525b">Settings</text>
      </g>

      <!-- NOTE: Admin link NOT shown — user alice has role=user, not admin -->

    </g>

    <!-- FLEX-1 SPACER — nav ends at ~232, user section at ~810 -->

    <!-- SEPARATOR above user section -->
    <line x1="0" y1="810" x2="220" y2="810" stroke="#e4e4e7" stroke-width="1"/>

    <!-- USER SECTION: px-4 py-3 -->
    <g id="zone-user">

      <!-- Identity row: flex items-center gap-3 -->
      <!-- Avatar: w-8 h-8 = 32px, bg-violet-100 text-violet-700 fallback "A" -->
      <circle cx="30" cy="840" r="16" fill="#ede9fe"/>
      <text x="30" y="845" font-size="12" font-weight="600" fill="#6d28d9" text-anchor="middle">A</text>

      <!-- Username column -->
      <text x="52" y="834" font-size="14" font-weight="500" fill="#18181b">alice</text>
      <!-- Role badge: variant=outline, outline border-zinc-200 text-zinc-600 -->
      <rect x="52" y="838" width="34" height="16" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
      <text x="69" y="850" font-size="11" font-weight="500" fill="#52525b" text-anchor="middle">user</text>

      <!-- Sign out button: variant=ghost size=sm w-full, LogOut icon -->
      <rect x="8" y="864" width="204" height="28" rx="6" fill="none"/>
      <!-- LogOut icon: 16px -->
      <g transform="translate(16, 872)" fill="none" stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 0 L2 0 Q0 0 0 2 L0 12 Q0 14 2 14 L6 14"/>
        <polyline points="10,4 14,7 10,10"/>
        <line x1="4" y1="7" x2="14" y2="7"/>
      </g>
      <text x="38" y="883" font-size="14" font-weight="400" fill="#71717a">Sign out</text>

    </g>
  </g>

  <!-- ===================== MAIN CONTENT AREA ===================== -->
  <!-- flex-1 overflow-y-auto bg-white, starts at x=220 -->
  <g id="layer-content">
    <rect x="220" y="0" width="1220" height="900" fill="#ffffff"/>

    <!-- Inner padding: px-6 py-6 — content at x=244, y=24 -->
    <!-- max-w-5xl (1024px) centered in 1220px → (1220-1024)/2 = 98 margin each side → x=318 -->

    <!-- PAGE HEADER: flex items-center justify-between mb-6 -->
    <g id="zone-page-header">
      <!-- Title: text-2xl font-semibold text-zinc-900 -->
      <text x="318" y="56" font-size="24" font-weight="600" fill="#18181b">Sessions</text>

      <!-- "New session" button (Button default variant): right side at x=318+1024=1342, button width ~120px -->
      <rect x="1222" y="32" width="120" height="36" rx="6" fill="#18181b"/>
      <text x="1282" y="55" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">New session</text>
    </g>

    <!-- SEPARATOR below header: y=72 -->
    <line x1="318" y1="72" x2="1342" y2="72" stroke="#f4f4f5" stroke-width="1"/>

    <!-- SESSION CARDS — skeleton shimmer state (zinc-100 fill = #f4f4f5) -->
    <!-- 2-column grid, 3 cards. gap-6 (24px). Card width = (1024-24)/2 = 500px -->
    <g id="zone-session-cards">

      <!-- Card 1 — col 1, row 1 -->
      <rect x="318" y="92" width="496" height="120" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
      <!-- Skeleton: title line -->
      <rect x="338" y="112" width="200" height="14" rx="4" fill="#f4f4f5"/>
      <!-- Skeleton: subtitle line -->
      <rect x="338" y="134" width="320" height="12" rx="4" fill="#f4f4f5"/>
      <!-- Skeleton: meta line -->
      <rect x="338" y="154" width="140" height="10" rx="4" fill="#f4f4f5"/>
      <!-- Skeleton: badge -->
      <rect x="338" y="174" width="60" height="16" rx="8" fill="#f4f4f5"/>

      <!-- Card 2 — col 2, row 1 -->
      <rect x="838" y="92" width="496" height="120" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
      <rect x="858" y="112" width="220" height="14" rx="4" fill="#f4f4f5"/>
      <rect x="858" y="134" width="280" height="12" rx="4" fill="#f4f4f5"/>
      <rect x="858" y="154" width="120" height="10" rx="4" fill="#f4f4f5"/>
      <rect x="858" y="174" width="60" height="16" rx="8" fill="#f4f4f5"/>

      <!-- Card 3 — col 1, row 2 -->
      <rect x="318" y="236" width="496" height="120" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
      <rect x="338" y="256" width="180" height="14" rx="4" fill="#f4f4f5"/>
      <rect x="338" y="278" width="300" height="12" rx="4" fill="#f4f4f5"/>
      <rect x="338" y="298" width="100" height="10" rx="4" fill="#f4f4f5"/>
      <rect x="338" y="318" width="60" height="16" rx="8" fill="#f4f4f5"/>

    </g>

  </g>

  <!-- ===================== CALLOUT ANNOTATIONS ===================== -->
  <g id="annotations" font-family="'Geist Mono', 'Courier New', monospace">

    <!-- Sidebar annotation -->
    <text x="4" y="894" font-size="10" fill="#6d28d9">Sidebar: w-[220px] bg-zinc-50 border-r border-zinc-200 hidden lg:flex flex-col</text>

    <!-- Active nav annotation -->
    <line x1="220" y1="82" x2="255" y2="82" stroke="#6d28d9" stroke-width="0.75" stroke-dasharray="3 2"/>
    <text x="258" y="78" font-size="10" fill="#6d28d9">active: bg-violet-50 text-violet-600 border-l-2 border-violet-600 pl-[10px]</text>

    <!-- Inactive nav annotation -->
    <line x1="220" y1="126" x2="255" y2="126" stroke="#6d28d9" stroke-width="0.75" stroke-dasharray="3 2"/>
    <text x="258" y="122" font-size="10" fill="#6d28d9">inactive: text-zinc-600, hover: bg-zinc-100 text-zinc-900</text>

    <!-- Admin link note -->
    <text x="8" y="246" font-size="10" fill="#a78bfa">Admin link hidden</text>
    <text x="8" y="258" font-size="10" fill="#a78bfa">isAdmin=false</text>

    <!-- User section annotations -->
    <line x1="220" y1="840" x2="255" y2="840" stroke="#6d28d9" stroke-width="0.75" stroke-dasharray="3 2"/>
    <text x="258" y="836" font-size="10" fill="#6d28d9">Avatar: bg-violet-100 #ede9fe / text-violet-700 #6d28d9</text>
    <text x="258" y="849" font-size="10" fill="#a78bfa">fallback: first letter uppercase font-semibold text-xs</text>
    <text x="258" y="862" font-size="10" fill="#a78bfa">role badge: variant=outline border-zinc-200</text>

    <!-- PageHeader annotation -->
    <line x1="1342" y1="56" x2="1390" y2="56" stroke="#6d28d9" stroke-width="0.75" stroke-dasharray="3 2"/>
    <text x="1392" y="52" font-size="10" fill="#6d28d9">PageHeader: flex justify-between mb-6</text>
    <text x="1392" y="65" font-size="10" fill="#a78bfa">title text-2xl font-semibold</text>
    <text x="1392" y="78" font-size="10" fill="#a78bfa">action slot: Button default</text>

    <!-- Cards annotation -->
    <line x1="814" y1="152" x2="840" y2="152" stroke="#6d28d9" stroke-width="0.75" stroke-dasharray="3 2"/>
    <text x="842" y="148" font-size="10" fill="#6d28d9">SessionCard skeleton: animate-pulse</text>
    <text x="842" y="161" font-size="10" fill="#a78bfa">bg-zinc-100 #f4f4f5 skeleton lines</text>
    <text x="842" y="174" font-size="10" fill="#a78bfa">Card: border-zinc-200 shadow-sm rounded-lg</text>

    <!-- Main area annotation -->
    <text x="226" y="895" font-size="10" fill="#6d28d9">Main: flex-1 overflow-y-auto bg-white px-6 py-6 — content: max-w-5xl mx-auto</text>
  </g>

</svg>
