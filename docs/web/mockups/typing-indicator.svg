<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="480"
  height="300"
  viewBox="0 0 480 300"
>
  <desc>
  Component: TypingIndicator
  Page: Session Chat (/sessions/:id) — message list, renders below the last assistant message while the LLM is generating
  Design system version: 3.2 (2026-03-22)
  Artboards: component context 480×300px (no separate mobile artboard — indicator is structurally identical at all widths)
  </desc>

  <!-- ═══════════════════════════════════════════════════
       SHARED DEFS
  ════════════════════════════════════════════════════ -->
  <defs>
    <!-- Drop shadow filter matching shadow-sm: 0 1px 2px rgba(0,0,0,0.05) -->
    <filter id="shadow-sm" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="rgba(0,0,0,0.05)" />
    </filter>

    <!-- Bubble clip paths for rounded-2xl rounded-bl-sm
         rounded-2xl = 16px on all corners, rounded-bl-sm = 2px on bottom-left -->

    <!-- Left column completed-message bubble (max-w-[75%] of 200px half = 150px wide) -->
    <clipPath id="clip-bubble-left-a">
      <rect x="0" y="0" width="210" height="64" rx="16" ry="16" />
    </clipPath>
    <clipPath id="clip-bubble-left-b">
      <rect x="0" y="0" width="180" height="56" rx="16" ry="16" />
    </clipPath>

    <!-- Right column bubble clips -->
    <clipPath id="clip-bubble-right-a">
      <rect x="0" y="0" width="210" height="64" rx="16" ry="16" />
    </clipPath>
    <clipPath id="clip-bubble-right-b">
      <rect x="0" y="0" width="180" height="56" rx="16" ry="16" />
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════════
       CANVAS BACKGROUND — bg-zinc-50 #fafafa
  ════════════════════════════════════════════════════ -->
  <rect width="480" height="300" fill="#fafafa" />

  <!-- ═══════════════════════════════════════════════════
       COLUMN DIVIDER (subtle — guides the eye only)
  ════════════════════════════════════════════════════ -->
  <line x1="240" y1="0" x2="240" y2="300" stroke="#e4e4e7" stroke-width="1" />

  <!-- ═══════════════════════════════════════════════════
       COLUMN LABELS
       text-xs / font-medium / text-zinc-500 (#71717a)
       system-ui, sans-serif
  ════════════════════════════════════════════════════ -->
  <text
    x="120"
    y="22"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#71717a"
    letter-spacing="0.04em"
  >STREAMING</text>

  <text
    x="360"
    y="22"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#71717a"
    letter-spacing="0.04em"
  >prefers-reduced-motion</text>

  <!-- ═══════════════════════════════════════════════════
       LEFT COLUMN — "Streaming" state
  ════════════════════════════════════════════════════ -->
  <g id="layer-content-left">

    <!-- Completed assistant message bubble
         bg-white, border-zinc-200, rounded-2xl rounded-bl-sm, px-4 py-3, shadow-sm
         Width ~210px, positioned at x=16, y=36 -->
    <g id="bubble-completed-left" transform="translate(16, 36)">
      <!-- rounded-2xl = 16px all corners, rounded-bl-sm = 2px bottom-left
           Achieved by drawing the full rounded rect then re-squaring bl with a filled overlay -->
      <!-- Shadow layer (behind border) -->
      <rect
        x="0" y="0" width="210" height="64"
        rx="16" ry="16"
        fill="white"
        filter="url(#shadow-sm)"
      />
      <!-- Border rect -->
      <rect
        x="0.5" y="0.5" width="209" height="63"
        rx="15.5" ry="15.5"
        fill="white"
        stroke="#e4e4e7"
        stroke-width="1"
      />
      <!-- Square off bottom-left corner (rounded-bl-sm = 2px, override the 16px radius)
           Cover the bottom-left arc with white + a tiny 2px-radius rect -->
      <rect
        x="0" y="44" width="18" height="20"
        fill="white"
      />
      <!-- Redraw bottom-left corner as 2px radius -->
      <path
        d="M 0 48 Q 0 64 2 64 L 0 64 Z"
        fill="#e4e4e7"
      />
      <rect
        x="0.5" y="48" width="17" height="15.5"
        fill="white"
      />
      <path
        d="M 0.5 49 Q 0.5 63.5 2 63.5 L 18 63.5"
        fill="none"
        stroke="#e4e4e7"
        stroke-width="1"
      />
      <!-- Left border segment for the bottom portion -->
      <line x1="0.5" y1="48" x2="0.5" y2="49" stroke="#e4e4e7" stroke-width="1" />

      <!-- Message text: "Here is what I found…"
           text-base (16px), font-normal, text-zinc-900, leading-relaxed (1.75)
           px-4 py-3 = 16px horizontal, 12px vertical padding -->
      <text
        x="16" y="30"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14"
        font-weight="400"
        fill="#18181b"
      >Here is what I found</text>
      <text
        x="16" y="48"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14"
        font-weight="400"
        fill="#71717a"
      >for your query.</text>
    </g>

    <!-- Typing indicator bubble
         Same shape as assistant bubble — bg-white, border-zinc-200,
         rounded-2xl rounded-bl-sm, shadow-sm
         Sits 8px below the completed message (gap-2 equivalent)
         Width is compact: 3 dots × 8px + 2 gaps × 6px + 2 × px-4(16px) = 24+12+32 = 68px
         y = 36 + 64 + 8 = 108 -->
    <g id="bubble-typing-streaming" transform="translate(16, 108)">
      <!-- Bubble: 68px wide, 38px tall (py-3 = 12px top+bottom, 8px dot + 6px center = dot fits) -->

      <!-- Shadow -->
      <rect
        x="0" y="0" width="68" height="38"
        rx="16" ry="16"
        fill="white"
        filter="url(#shadow-sm)"
      />
      <!-- Border -->
      <rect
        x="0.5" y="0.5" width="67" height="37"
        rx="15.5" ry="15.5"
        fill="white"
        stroke="#e4e4e7"
        stroke-width="1"
      />
      <!-- Square off bottom-left corner (rounded-bl-sm) -->
      <rect x="0" y="22" width="18" height="16" fill="white" />
      <path
        d="M 0.5 23 Q 0.5 37.5 2 37.5 L 18 37.5"
        fill="none"
        stroke="#e4e4e7"
        stroke-width="1"
      />
      <line x1="0.5" y1="22" x2="0.5" y2="23" stroke="#e4e4e7" stroke-width="1" />

      <!-- Three dots, vertically centered in 38px bubble (center y = 19)
           Dot diameter 8px, so cy = 19. Gap = 6px. Total width = 8+6+8+6+8 = 36px
           First dot cx = 16 + 4 = 20 (px-4=16 padding, then radius=4)
           Second dot cx = 20 + 8 + 6 = 34
           Third dot cx = 34 + 8 + 6 = 48 -->

      <!-- Dot 1 — full opacity (wave peak, mid-animation) -->
      <circle cx="20" cy="19" r="4" fill="#a1a1aa" opacity="1.0" />

      <!-- Dot 2 — 60% opacity -->
      <circle cx="34" cy="19" r="4" fill="#a1a1aa" opacity="0.6" />

      <!-- Dot 3 — 30% opacity -->
      <circle cx="48" cy="19" r="4" fill="#a1a1aa" opacity="0.3" />
    </g>

    <!-- State annotation below the typing bubble
         text-xs, text-zinc-500 -->
    <text
      x="16" y="168"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="11"
      font-weight="400"
      fill="#71717a"
    >Dot 1: 100% · Dot 2: 60% · Dot 3: 30%</text>

  </g><!-- /layer-content-left -->

  <!-- ═══════════════════════════════════════════════════
       RIGHT COLUMN — "prefers-reduced-motion" state
  ════════════════════════════════════════════════════ -->
  <g id="layer-content-right">

    <!-- Completed assistant message bubble (right column, x=256) -->
    <g id="bubble-completed-right" transform="translate(256, 36)">
      <!-- Shadow -->
      <rect
        x="0" y="0" width="210" height="64"
        rx="16" ry="16"
        fill="white"
        filter="url(#shadow-sm)"
      />
      <!-- Border -->
      <rect
        x="0.5" y="0.5" width="209" height="63"
        rx="15.5" ry="15.5"
        fill="white"
        stroke="#e4e4e7"
        stroke-width="1"
      />
      <!-- Square off bottom-left (rounded-bl-sm) -->
      <rect x="0" y="44" width="18" height="20" fill="white" />
      <path
        d="M 0.5 49 Q 0.5 63.5 2 63.5 L 18 63.5"
        fill="none"
        stroke="#e4e4e7"
        stroke-width="1"
      />
      <line x1="0.5" y1="48" x2="0.5" y2="49" stroke="#e4e4e7" stroke-width="1" />

      <!-- Message text -->
      <text
        x="16" y="30"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14"
        font-weight="400"
        fill="#18181b"
      >Here is what I found</text>
      <text
        x="16" y="48"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14"
        font-weight="400"
        fill="#71717a"
      >for your query.</text>
    </g>

    <!-- Typing indicator bubble — reduced motion variant
         All three dots at equal 50% opacity (static, no wave)
         Same geometry: x=256, y=108 -->
    <g id="bubble-typing-reduced-motion" transform="translate(256, 108)">
      <!-- Shadow -->
      <rect
        x="0" y="0" width="68" height="38"
        rx="16" ry="16"
        fill="white"
        filter="url(#shadow-sm)"
      />
      <!-- Border -->
      <rect
        x="0.5" y="0.5" width="67" height="37"
        rx="15.5" ry="15.5"
        fill="white"
        stroke="#e4e4e7"
        stroke-width="1"
      />
      <!-- Square off bottom-left (rounded-bl-sm) -->
      <rect x="0" y="22" width="18" height="16" fill="white" />
      <path
        d="M 0.5 23 Q 0.5 37.5 2 37.5 L 18 37.5"
        fill="none"
        stroke="#e4e4e7"
        stroke-width="1"
      />
      <line x1="0.5" y1="22" x2="0.5" y2="23" stroke="#e4e4e7" stroke-width="1" />

      <!-- Three dots — all at equal 50% opacity -->
      <circle cx="20" cy="19" r="4" fill="#a1a1aa" opacity="0.5" />
      <circle cx="34" cy="19" r="4" fill="#a1a1aa" opacity="0.5" />
      <circle cx="48" cy="19" r="4" fill="#a1a1aa" opacity="0.5" />
    </g>

    <!-- State annotation -->
    <text
      x="256" y="168"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="11"
      font-weight="400"
      fill="#71717a"
    >Dot 1: 50% · Dot 2: 50% · Dot 3: 50%</text>

  </g><!-- /layer-content-right -->

  <!-- ═══════════════════════════════════════════════════
       SPEC ANNOTATIONS (bottom of canvas)
       Measurement callouts for web_coder reference
  ════════════════════════════════════════════════════ -->
  <g id="layer-annotations" opacity="0.85">

    <!-- Horizontal rule separating mockup from spec notes -->
    <line x1="16" y1="188" x2="464" y2="188" stroke="#e4e4e7" stroke-width="1" />

    <!-- Section title -->
    <text
      x="16" y="204"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="10"
      font-weight="600"
      fill="#52525b"
      letter-spacing="0.06em"
    >IMPLEMENTATION SPEC</text>

    <!-- Spec rows: left column labels, right column values -->

    <!-- Row 1 -->
    <text x="16"  y="220" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#71717a">Bubble</text>
    <text x="100" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#18181b">bg-white · border border-zinc-200 · rounded-2xl rounded-bl-sm · px-4 py-3 · shadow-sm</text>

    <!-- Row 2 -->
    <text x="16"  y="234" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#71717a">Dots</text>
    <text x="100" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#18181b">3 × 8px circle · bg-zinc-400 (#a1a1aa) · gap 6px · vertically centered</text>

    <!-- Row 3 -->
    <text x="16"  y="248" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#71717a">Animation</text>
    <text x="100" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#18181b">@keyframes wave: dots cascade 0→60%→100% opacity, stagger 160ms, duration 1.2s, ease-in-out, infinite</text>

    <!-- Row 4 -->
    <text x="16"  y="262" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#71717a">Reduced motion</text>
    <text x="100" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#18181b">@media (prefers-reduced-motion) — all dots static at opacity 0.5, no animation</text>

    <!-- Row 5 -->
    <text x="16"  y="276" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#71717a">Alignment</text>
    <text x="100" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#18181b">justify-start (left-aligned, same as assistant bubble) · rendered below last message · gap-2 (8px)</text>

    <!-- Row 6 -->
    <text x="16"  y="290" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#71717a">Aria</text>
    <text x="100" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#18181b">role="status" aria-label="Assistant is typing" aria-live="polite"</text>

  </g><!-- /layer-annotations -->

</svg>
